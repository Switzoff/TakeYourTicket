<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 80px; }

    .header { padding: 52px 20px 8px; }
    .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
    .header p { color: #555; font-size: 12px; margin-top: 4px; }

    .stats { display: flex; gap: 8px; padding: 16px 20px; }
    .stat { flex: 1; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px; padding: 14px 12px; }
    .stat .val { font-size: 24px; font-weight: 500; }
    .stat .lbl { color: #555; font-size: 10px; margin-top: 4px; }

    .section-title { color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 20px 10px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; }

    .ticket-card { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px; overflow: hidden; position: relative; }
    .ticket-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .ticket-thumb { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .ticket-info { padding: 10px 10px 12px; }
    .ticket-info .title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-info .date { color: #555; font-size: 10px; margin-top: 3px; }

    .holo-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(30,30,30,0.85);
      border: 0.5px solid #444;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ccc;
      backdrop-filter: blur(4px);
    }


    .empty { text-align: center; padding: 60px 20px; color: #555; grid-column: span 2; }
    .empty p { font-size: 14px; margin-top: 8px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a;
      border-top: 0.5px solid #1e1e1e;
      display: flex;
      padding: 12px 0 24px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: #555; font-size: 10px;
      transition: color 0.15s;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TakeYourTicket</h1>
    <p>Ma collection</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="total">0</div><div class="lbl">Films vus</div></div>
    <div class="stat"><div class="val" id="mois">0</div><div class="lbl">Ce mois</div></div>
    <div class="stat"><div class="val" id="holos">0</div><div class="lbl">Holos</div></div>
  </div>

  <div class="section-title">Tickets récents</div>
  <div class="grid" id="grid">
    <div class="empty"><p>Scanne ton premier ticket !</p></div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Collection
    </a>
    <a href="/scanner" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M3 9V6a1 1 0 0 1 1-1h3M15 5h3a1 1 0 0 1 1 1v3M21 15v3a1 1 0 0 1-1 1h-3M9 19H6a1 1 0 0 1-1-1v-3"/>
      </svg>
      Scanner
    </a>
    <a href="/profil" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profil
    </a>
  </nav>

  <script>
    function seDeconnecter() {
      localStorage.clear();
      window.location.href = '/login';
    }

    const userStored = JSON.parse(localStorage.getItem('user'));
    if (!userStored) {
      window.location.href = '/login';
    } else {
      charger(userStored.uid);
    }

    function formatDate(str) {
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function charger(uid) {
      const grid = document.getElementById('grid');
      const totalEl = document.getElementById('total');
      const moisEl = document.getElementById('mois');
      const holosEl = document.getElementById('holos');

      try {
        const res = await fetch(`/api/collections?uid=${uid}`);
        const tickets = await res.json();

        totalEl.textContent = tickets.length;

        const maintenant = new Date();
        const ceMois = tickets.filter(t => {
          const d = new Date(t.date);
          return d.getMonth() === maintenant.getMonth() && d.getFullYear() === maintenant.getFullYear();
        }).length;
        moisEl.textContent = ceMois;
        holosEl.textContent = tickets.filter(t => t.holo).length;

        if (tickets.length === 0) {
          grid.innerHTML = '<div class="empty"><p>Scanne ton premier ticket !</p></div>';
          return;
        }

        grid.innerHTML = '';
        for (const t of [...tickets].reverse()) {
          const r = await fetch(`/api/affiche/${encodeURIComponent(t.film)}`);
          const data = await r.json();
          const img = data.affiche
            ? `<img src="${data.affiche}" alt="${t.film}">`
            : `<div class="ticket-thumb" style="background:linear-gradient(135deg,#1a1a2e,#0f3460)">🎬</div>`;
          const holo = t.holo ? `<div class="holo-badge">HOLO</div>` : '';
          grid.innerHTML += `
            <div class="ticket-card">
              ${img}
              ${holo}
              <div class="ticket-info">
                <div class="title">${t.film}</div>
                <div class="date">${formatDate(t.date)}</div>
              </div>
            </div>`;
        }
      } catch(e) {
        console.error('Erreur:', e);
      }
    }
  </script>
</body>
</html>
