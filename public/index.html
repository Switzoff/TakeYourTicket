<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; }
    .header { padding: 24px 20px 8px; }
    .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
    .header p { color: #555; font-size: 12px; margin-top: 4px; }
    .stats { display: flex; gap: 8px; padding: 16px 20px; }
    .stat { flex: 1; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 12px; }
    .stat .val { font-size: 22px; font-weight: 500; }
    .stat .lbl { color: #555; font-size: 10px; margin-top: 4px; }
    .section-title { color: #555; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 0 20px 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; }
    .ticket-card { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
    .ticket-card img { width: 100%; height: 80px; object-fit: cover; }
    .ticket-thumb { height: 80px; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .ticket-info { padding: 8px 10px; }
    .ticket-info .title { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-info .date { color: #555; font-size: 9px; margin-top: 2px; }
    .empty { text-align: center; padding: 60px 20px; color: #555; grid-column: span 2; }
    .empty p { font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TakeYourTicket</h1>
    <p>Ma collection</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="val" id="total">0</div><div class="lbl">Films vus</div></div>
    <div class="stat"><div class="val" id="mois">0</div><div class="lbl">Ce mois</div></div>
  </div>
  <div class="section-title">Mes tickets</div>
  <div class="grid" id="grid">
    <div class="empty"><p>Scanne ton premier ticket !</p></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const film = params.get('film');
    const cinema = params.get('cinema');
    const date = params.get('date');

    let tickets = JSON.parse(localStorage.getItem('tickets') || '[]');

    if (film) {
      tickets.push({ film, cinema, date });
      localStorage.setItem('tickets', JSON.stringify(tickets));
      window.history.replaceState({}, '', '/collection');
    }

    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    const mois = document.getElementById('mois');

    total.textContent = tickets.length;

    const maintenant = new Date();
    const ceMois = tickets.filter(t => {
      const d = new Date(t.date);
      return d.getMonth() === maintenant.getMonth() && d.getFullYear() === maintenant.getFullYear();
    }).length;
    mois.textContent = ceMois;

    async function chargerAffiches() {
      if (tickets.length === 0) return;
      grid.innerHTML = '';
      for (const t of [...tickets].reverse()) {
        const res = await fetch(`/api/affiche/${encodeURIComponent(t.film)}`);
        const data = await res.json();
        const img = data.affiche
          ? `<img src="${data.affiche}" style="width:100%;height:80px;object-fit:cover;">`
          : `<div class="ticket-thumb">🎬</div>`;
        grid.innerHTML += `
          <div class="ticket-card">
            ${img}
            <div class="ticket-info">
              <div class="title">${t.film}</div>
              <div class="date">${t.date} — ${t.cinema}</div>
            </div>
          </div>`;
      }
    }
    chargerAffiches();
  </script>
</body>
</html>
