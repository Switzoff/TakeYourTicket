<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/auth-init.js"></script>
  <script src="/badge-render.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 80px; }

    .header { padding: 52px 20px 8px; }
    .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
    .header p { color: #555; font-size: 12px; margin-top: 4px; }

    .stats { display: flex; gap: 8px; padding: 16px 20px; }
    .stat { flex: 1; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px; padding: 14px 12px; }
    .stat .val { font-size: 24px; font-weight: 500; }
    .stat .lbl { color: #555; font-size: 10px; margin-top: 4px; }

    .section-title { color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 20px 10px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px; }

    .ticket-card {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px;
      overflow: hidden; position: relative; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .ticket-card:active { transform: scale(0.97); border-color: #444; }
    .ticket-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .ticket-thumb { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .ticket-info { padding: 10px 10px 12px; }
    .ticket-info .title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-info .date { color: #555; font-size: 10px; margin-top: 3px; }

    .holo-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(30,30,30,0.85);
      border: 0.5px solid #444;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ccc;
      backdrop-filter: blur(4px);
    }

    .empty { text-align: center; padding: 60px 20px; color: #555; grid-column: span 2; }
    .empty p { font-size: 14px; margin-top: 8px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 0.5px solid #1e1e1e;
      display: flex; padding: 12px 0 24px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: #555; font-size: 10px;
      transition: color 0.15s;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; }

    /* ── FICHE DÉTAILLÉE (modal plein écran) ─────────────────────────── */
    .detail-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: #0a0a0a;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      overflow-y: auto;
      will-change: transform;
    }
    .detail-modal.active { transform: translateY(0); }

    .detail-hero {
      position: relative; width: 100%; height: 280px;
      background: #1a1a1a;
      overflow: hidden;
    }
    .detail-hero .backdrop {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0.55;
    }
    .detail-hero .gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.1) 40%, #0a0a0a 100%);
    }
    .detail-hero .close-btn {
      position: absolute; top: 16px; left: 16px; z-index: 5;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-hero .close-btn svg { width: 20px; height: 20px; }

    .detail-head {
      position: relative; padding: 0 20px;
      margin-top: -90px;
      display: flex; gap: 14px; align-items: flex-end;
    }
    .detail-poster {
      flex-shrink: 0; width: 110px; height: 165px;
      border-radius: 10px; overflow: hidden;
      background: #1a1a1a; border: 0.5px solid #2a2a2a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      cursor: zoom-in; position: relative;
    }
    .detail-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-poster .zoom-hint {
      position: absolute; inset: 0;
    }
    .detail-poster .zoom-hint svg { display: none; }

    /* ── POSTER LIGHTBOX ─────────────────────────────────────────────── */
    .poster-lightbox {
      position: fixed; inset: 0; z-index: 1200;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .poster-lightbox.active { opacity: 1; pointer-events: all; }
    .poster-lightbox img {
      max-width: min(90vw, 420px); max-height: 88vh;
      border-radius: 14px; object-fit: contain;
      box-shadow: 0 24px 80px rgba(0,0,0,0.9);
      transform: scale(0.88);
      transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
    }
    .poster-lightbox.active img { transform: scale(1); }
    .poster-lightbox-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.2);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .poster-lightbox-close svg { width: 18px; height: 18px; }
    .detail-head-info { flex: 1; padding-bottom: 6px; min-width: 0; }
    .detail-head-info .title {
      font-size: 20px; font-weight: 700; line-height: 1.2;
    }
    .detail-head-info .tagline {
      color: #888; font-size: 12px; font-style: italic; margin-top: 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 16px 20px 0;
    }
    .meta-chip {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 18px;
      padding: 6px 12px; font-size: 11px; color: #ddd;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .meta-chip.collector {
      background: linear-gradient(135deg, #2d1b3e, #1a1a2e);
      border-color: #5a3a7a; color: #fff;
    }
    .meta-chip svg { width: 12px; height: 12px; }

    .detail-section { padding: 20px 20px 4px; }
    .detail-section .label {
      color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px;
    }
    .detail-section .body {
      color: #ccc; font-size: 13px; line-height: 1.55;
    }

    .cast-row {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 4px 20px 8px; scrollbar-width: none;
    }
    .cast-row::-webkit-scrollbar { display: none; }

    .tmdb-credit {
      text-align: center; color: #444; font-size: 10px;
      padding: 16px 20px 24px; letter-spacing: 0.3px;
    }
    .tmdb-credit a { color: #666; text-decoration: underline; }
    .cast-card { flex-shrink: 0; width: 86px; }
    .cast-card .photo {
      width: 86px; height: 86px; border-radius: 50%; overflow: hidden;
      background: #1a1a1a; border: 0.5px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .cast-card .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cast-card .name {
      font-size: 11px; color: #fff; margin-top: 8px; line-height: 1.25;
      text-align: center;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .cast-card .role {
      font-size: 10px; color: #666; margin-top: 2px; text-align: center;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }

    .detail-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 24px 20px 32px;
    }
    .action-btn {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px;
      padding: 14px; color: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:hover { background: #1f1f1f; border-color: #444; }
    .action-btn.primary { background: #fff; color: #000; border-color: #fff; grid-column: span 2; }
    .action-btn.primary:hover { background: #e6e6e6; }
    .action-btn svg { width: 16px; height: 16px; }

    .detail-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px; color: #555; font-size: 13px;
    }

    /* ── VUE TICKET 3D (modal secondaire) ────────────────────────────── */
    .ticket-modal {
      position: fixed; inset: 0; z-index: 1100;
      background: rgba(0,0,0,0.94); backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; transition: opacity 0.3s;
    }
    .ticket-modal.active { display: flex; opacity: 1; }

    .card-stage {
      position: relative;
      width: 100%; max-width: 340px;
      perspective: 1600px;
      -webkit-perspective: 1600px;
      touch-action: pan-y;
    }

    .card-flip {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transform:
        scale(var(--enter, 0.88))
        rotateX(var(--rx, 0deg))
        rotateY(calc(var(--ry, 0deg) + var(--flip, 0deg)));
      transition: transform 0.55s cubic-bezier(.2,.85,.25,1);
      cursor: grab;
      will-change: transform;
    }
    .ticket-modal.active .card-flip { --enter: 1; }
    .card-flip.dragging { transition: none; cursor: grabbing; }
    .card-flip.flipped { --flip: 180deg; }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      border: 0.5px solid #333;
      background: linear-gradient(180deg, #1c1c1c 0%, #0f0f0f 100%);
      box-shadow:
        0 28px 70px -16px rgba(0,0,0,0.85),
        0 0 0 0.5px rgba(255,255,255,0.04) inset;
    }
    .card-face.holo {
      background:
        linear-gradient(120deg,
          rgba(255,200,255,0.1) 0%,
          rgba(180,220,255,0.08) 25%,
          rgba(255,255,180,0.1) 50%,
          rgba(180,255,200,0.08) 75%,
          rgba(255,200,255,0.1) 100%),
        linear-gradient(180deg, #1c1c1c 0%, #0f0f0f 100%);
      border-color: rgba(180,180,255,0.4);
    }
    .card-back { transform: rotateY(180deg); }

    /* Recto */
    .card-front .ticket-poster {
      width: 100%; aspect-ratio: 2/3; background: #1a1a1a;
      display: flex; align-items: center; justify-content: center; font-size: 48px;
      position: absolute; inset: 0;
    }
    .card-front .ticket-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-front .ticket-overlay {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 60px 18px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
      color: #fff;
    }
    .card-front .t-title { font-size: 15px; font-weight: 700; line-height: 1.25; }
    .card-front .t-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: #bbb; }
    .card-front .t-tag {
      background: rgba(180,180,255,0.18); border: 0.5px solid rgba(180,180,255,0.35);
      color: #cdf; font-size: 9px; font-weight: 700;
      padding: 3px 7px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;
    }
    .card-front .t-id {
      position: absolute; top: 12px; left: 14px;
      font-family: 'SF Mono', Menlo, monospace; font-size: 9px;
      color: rgba(255,255,255,0.55); letter-spacing: 1px;
      background: rgba(0,0,0,0.55); padding: 3px 7px; border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    /* Verso : visuel pur, aucun texte */
    .card-back-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-hint {
      position: absolute; left: 50%; bottom: -44px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 11px; letter-spacing: 0.6px; white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    .ticket-modal.active .card-hint { opacity: 1; transition-delay: 0.7s; }

    .ticket-modal-close {
      position: absolute; top: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.15);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5;
    }

    /* Toast minimaliste */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); color: #000;
      padding: 10px 18px; border-radius: 24px;
      font-size: 13px; font-weight: 500;
      z-index: 2000; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>TakeYourTicket</h1>
    <p>Ma collection</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="total">0</div><div class="lbl">Films vus</div></div>
  </div>

  <div class="section-title">Tickets récents</div>
  <div class="grid" id="grid">
    <div class="empty"><p>Scanne ton premier ticket !</p></div>
  </div>

  <!-- Fiche détaillée -->
  <div class="detail-modal" id="detail-modal">
    <div class="detail-hero">
      <div class="backdrop" id="detail-backdrop"></div>
      <div class="gradient"></div>
      <button class="close-btn" onclick="closeDetail()" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
    </div>

    <div id="detail-content"></div>
  </div>

  <!-- Carte ticket 3D (recto + verso) -->
  <div class="ticket-modal" id="ticket-modal" onclick="closeTicket(event)">
    <button class="ticket-modal-close" onclick="closeTicket()" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="card-stage" id="card-stage" onclick="event.stopPropagation()">
      <div class="card-flip" id="card-flip">
        <div class="card-face card-front" id="card-front"></div>
        <div class="card-face card-back" id="card-back"></div>
      </div>
      <div class="card-hint" id="card-hint">Touche ou glisse pour retourner</div>
    </div>
  </div>

  <!-- Lightbox affiche -->
  <div class="poster-lightbox" id="poster-lightbox" onclick="closePosterLightbox(event)">
    <button class="poster-lightbox-close" onclick="closePosterLightbox()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <img id="poster-lightbox-img" src="" alt="">
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Collection
    </a>
    <a href="/scanner" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M3 9V6a1 1 0 0 1 1-1h3M15 5h3a1 1 0 0 1 1 1v3M21 15v3a1 1 0 0 1-1 1h-3M9 19H6a1 1 0 0 1-1-1v-3"/>
      </svg>
      Scanner
    </a>
    <a href="/profil" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profil
    </a>
  </nav>

  <script>
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatDate(str) {
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // Cache des affiches + détails
    const posterCache = new Map();
    const detailsCache = new Map();

    async function fetchPoster(film) {
      if (posterCache.has(film)) return posterCache.get(film);
      try {
        const r = await fetch(`/api/affiche/${encodeURIComponent(film)}`);
        const d = await r.json();
        posterCache.set(film, d.affiche || null);
        return d.affiche || null;
      } catch { return null; }
    }

    async function fetchDetails(film) {
      if (detailsCache.has(film)) return detailsCache.get(film);
      try {
        const r = await fetch(`/api/film-details?title=${encodeURIComponent(film)}`);
        const d = await r.json();
        detailsCache.set(film, d);
        return d;
      } catch { return {}; }
    }

    let currentTicket = null;
    let currentDetails = null;

    async function openDetail(ticket) {
      currentTicket = ticket;
      currentDetails = null;

      const modal = document.getElementById('detail-modal');
      const backdrop = document.getElementById('detail-backdrop');
      const content = document.getElementById('detail-content');

      backdrop.style.backgroundImage = '';
      content.innerHTML = `<div class="detail-loading">Chargement…</div>`;
      modal.scrollTop = 0;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

      const details = await fetchDetails(ticket.film);
      currentDetails = details;
      renderDetail(ticket, details);
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function renderDetail(ticket, d) {
      const backdrop = document.getElementById('detail-backdrop');
      if (d.backdrop) backdrop.style.backgroundImage = `url(${d.backdrop})`;
      else if (d.poster) backdrop.style.backgroundImage = `url(${d.poster})`;

      const posterSrc = d.poster ? escapeHtml(d.poster) : '';
      const poster = d.poster
        ? `<img src="${posterSrc}" alt="">
           <div class="zoom-hint" onclick="openPosterLightbox('${posterSrc}')">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
             </svg>
           </div>`
        : `🎬`;

      const collector = ticket.holo
        ? `<span class="meta-chip collector">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
             </svg>
             Collector
           </span>`
        : `<span class="meta-chip">Standard</span>`;

      const cinemaChip = ticket.cinema
        ? `<span class="meta-chip">📍 ${escapeHtml(ticket.cinema)}</span>`
        : '';
      const dateChip = `<span class="meta-chip">📅 ${escapeHtml(formatDate(ticket.date))}</span>`;
      const runtimeChip = d.runtime
        ? `<span class="meta-chip">⏱ ${d.runtime} min</span>` : '';
      const genreChips = (d.genres || []).slice(0, 2).map(g =>
        `<span class="meta-chip">${escapeHtml(g)}</span>`
      ).join('');

      const overview = d.overview
        ? `<div class="detail-section">
             <div class="label">Synopsis</div>
             <div class="body">${escapeHtml(d.overview)}</div>
           </div>`
        : '';

      const cast = (d.cast || []).length
        ? `<div class="detail-section">
             <div class="label">Casting</div>
           </div>
           <div class="cast-row">
             ${d.cast.map(c => {
               const photo = c.photo
                 ? `<img src="${escapeHtml(c.photo)}" alt="" loading="lazy">`
                 : `👤`;
               return `<div class="cast-card">
                 <div class="photo">${photo}</div>
                 <div class="name">${escapeHtml(c.name || '')}</div>
                 ${c.character ? `<div class="role">${escapeHtml(c.character)}</div>` : ''}
               </div>`;
             }).join('')}
           </div>`
        : '';

      document.getElementById('detail-content').innerHTML = `
        <div class="detail-head">
          <div class="detail-poster">${poster}</div>
          <div class="detail-head-info">
            <div class="title">${escapeHtml(d.title || ticket.film)}</div>
            ${d.tagline ? `<div class="tagline">${escapeHtml(d.tagline)}</div>` : ''}
          </div>
        </div>

        <div class="detail-meta">
          ${collector}
          ${dateChip}
          ${cinemaChip}
          ${runtimeChip}
          ${genreChips}
        </div>

        ${overview}

        ${cast}

        <div class="detail-actions">
          <button class="action-btn primary" onclick="openTicket()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 9V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z"/>
              <path d="M13 5v2M13 17v2M13 11v2"/>
            </svg>
            Voir le ticket
          </button>
          <button class="action-btn" onclick="shareTicket()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/>
            </svg>
            Partager
          </button>
          <button class="action-btn" onclick="downloadTicket()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Télécharger
          </button>
          <button class="action-btn replay" onclick="replayAnimation()" style="grid-column: span 2;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Revoir l'animation
          </button>
        </div>

        <div class="tmdb-credit">Données : <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></div>
      `;
    }

    // ── Carte ticket 3D ──────────────────────────────────────────────
    const batchAssetsCache = new Map();
    async function fetchBatchAssets(batchId) {
      if (!batchId) return { recto: null, verso: null };
      if (batchAssetsCache.has(batchId)) return batchAssetsCache.get(batchId);
      try {
        const r = await apiFetch('/api/batch-assets/' + encodeURIComponent(batchId));
        const d = await r.json();
        const out = { recto: d.recto || null, verso: d.verso || null };
        batchAssetsCache.set(batchId, out);
        return out;
      } catch { return { recto: null, verso: null }; }
    }

    async function openTicket() {
      if (!currentTicket) return;
      const t = currentTicket;
      const d = currentDetails || {};
      const front = document.getElementById('card-front');
      const back = document.getElementById('card-back');
      const flip = document.getElementById('card-flip');

      // Charge les visuels du batch si non déjà copiés sur le ticket
      console.log('[openTicket]', { ticketId: t.ticketId, batchId: t.batchId, hasRecto: !!t.recto, hasVerso: !!t.verso });
      if (t.batchId && (!t.recto || !t.verso)) {
        const assets = await fetchBatchAssets(t.batchId);
        console.log('[openTicket] fetched assets:', { hasRecto: !!assets.recto, hasVerso: !!assets.verso });
        if (!t.recto && assets.recto) t.recto = assets.recto;
        if (!t.verso && assets.verso) t.verso = assets.verso;
      }

      // Reset flip + tilt
      flip.classList.remove('flipped');
      flip.style.setProperty('--rx', '0deg');
      flip.style.setProperty('--ry', '0deg');

      front.classList.toggle('holo', !!t.holo);
      back.classList.toggle('holo', !!t.holo);

      const posterSrc = t.recto || d.poster || '';
      const poster = posterSrc
        ? `<img src="${escapeHtml(posterSrc)}" alt="" draggable="false">`
        : `🎬`;
      const idShort = (t.ticketId || '').slice(0, 8).toUpperCase();

      front.innerHTML = `
        <div class="ticket-poster">${poster}</div>
        ${idShort ? `<div class="t-id">#${escapeHtml(idShort)}</div>` : ''}
        <div class="ticket-overlay">
          <div class="t-title">${escapeHtml(d.title || t.film)}</div>
          <div class="t-meta">
            <span>${escapeHtml(t.cinema || '')} · ${escapeHtml(formatDate(t.date))}</span>
            ${t.holo ? `<span class="t-tag">Collector</span>` : ''}
          </div>
        </div>
      `;

      // Verso : visuel uploadé par l'admin, sinon backdrop TMDB. Aucun texte.
      const versoSrc = t.verso || d.backdrop || d.poster || '';
      back.innerHTML = versoSrc
        ? `<img class="card-back-img" src="${escapeHtml(versoSrc)}" alt="" draggable="false">`
        : '';

      document.getElementById('ticket-modal').classList.add('active');
      bindCard3D();
    }

    function closeTicket(e) {
      if (e && e.target.closest('.card-stage')) return;
      document.getElementById('ticket-modal').classList.remove('active');
    }

    // ── Interactions 3D (tilt + flip + swipe) ────────────────────────
    let cardBound = false;
    function bindCard3D() {
      if (cardBound) return;
      cardBound = true;
      const stage = document.getElementById('card-stage');
      const flip = document.getElementById('card-flip');
      const isCoarse = window.matchMedia('(hover: none)').matches;

      // Tilt au survol (desktop uniquement)
      if (!isCoarse) {
        stage.addEventListener('mousemove', (e) => {
          if (flip.classList.contains('dragging')) return;
          const rect = flip.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width - 0.5;
          const y = (e.clientY - rect.top) / rect.height - 0.5;
          const mul = flip.classList.contains('flipped') ? -1 : 1;
          flip.style.setProperty('--rx', `${(-y * 8).toFixed(2)}deg`);
          flip.style.setProperty('--ry', `${(x * 12 * mul).toFixed(2)}deg`);
        });
        stage.addEventListener('mouseleave', () => {
          flip.style.setProperty('--rx', '0deg');
          flip.style.setProperty('--ry', '0deg');
        });
      }

      // Drag/swipe + click pour retourner
      let pid = null, sx = 0, sy = 0, dragging = false;
      flip.addEventListener('pointerdown', (e) => {
        pid = e.pointerId; sx = e.clientX; sy = e.clientY; dragging = false;
        try { flip.setPointerCapture(pid); } catch {}
      });
      flip.addEventListener('pointermove', (e) => {
        if (e.pointerId !== pid) return;
        const dx = e.clientX - sx;
        const dy = e.clientY - sy;
        if (!dragging && Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) {
          dragging = true;
          flip.classList.add('dragging');
        }
        if (dragging) {
          const delta = Math.max(-150, Math.min(150, dx * 0.55));
          flip.style.setProperty('--ry', `${delta}deg`);
        }
      });
      const endDrag = (e) => {
        if (e.pointerId !== pid) return;
        try { flip.releasePointerCapture(pid); } catch {}
        pid = null;
        flip.classList.remove('dragging');
        if (dragging) {
          const dx = e.clientX - sx;
          flip.style.setProperty('--ry', '0deg');
          if (Math.abs(dx) > 60) flip.classList.toggle('flipped');
        } else {
          flip.classList.toggle('flipped');
        }
        dragging = false;
      };
      flip.addEventListener('pointerup', endDrag);
      flip.addEventListener('pointercancel', endDrag);
    }

    // ── Partage ──────────────────────────────────────────────────────
    async function shareTicket() {
      if (!currentTicket) return;
      const t = currentTicket;
      const d = currentDetails || {};
      const text = `J'ai vu "${d.title || t.film}" ${t.cinema ? `au ${t.cinema}` : ''} le ${formatDate(t.date)}.`;
      try {
        if (navigator.share) {
          await navigator.share({
            title: 'TakeYourTicket',
            text,
            url: window.location.origin,
          });
        } else {
          await navigator.clipboard.writeText(text);
          showToast('Copié dans le presse-papiers');
        }
      } catch (e) { /* annulé */ }
    }

    // ── Téléchargement ───────────────────────────────────────────────
    async function urlToDataURL(url) {
      const r = await fetch(`/api/proxy-image?url=${encodeURIComponent(url)}`);
      if (!r.ok) throw new Error('proxy failed');
      const blob = await r.blob();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function downloadTicket() {
      if (!currentTicket) return;
      await openTicket();
      await new Promise(r => setTimeout(r, 100));

      const front = document.getElementById('card-front');

      // Convertir l'affiche TMDB en data URL pour éviter le CORS lors du snapshot
      const img = front.querySelector('.ticket-poster img');
      if (img && img.src && !img.src.startsWith('data:')) {
        try {
          const dataURL = await urlToDataURL(img.src);
          img.src = dataURL;
          if (img.decode) await img.decode().catch(() => {});
        } catch (e) { /* on continue, le poster sera vide */ }
      }

      // Cloner la face recto dans un conteneur sans transform 3D pour html2canvas
      const clone = front.cloneNode(true);
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:340px;height:510px;border-radius:18px;overflow:hidden;border:0.5px solid #333;background:linear-gradient(180deg,#1c1c1c 0%,#0f0f0f 100%);';
      if (front.classList.contains('holo')) {
        wrap.style.background = 'linear-gradient(120deg,rgba(255,200,255,0.1) 0%,rgba(180,220,255,0.08) 25%,rgba(255,255,180,0.1) 50%,rgba(180,255,200,0.08) 75%,rgba(255,200,255,0.1) 100%),linear-gradient(180deg,#1c1c1c 0%,#0f0f0f 100%)';
      }
      clone.style.cssText = 'position:absolute;inset:0;backface-visibility:visible;border:none;background:transparent;';
      wrap.appendChild(clone);
      document.body.appendChild(wrap);

      try {
        const canvas = await html2canvas(wrap, {
          backgroundColor: null,
          scale: 2,
        });
        const link = document.createElement('a');
        link.download = `ticket-${(currentDetails?.title || currentTicket.film).replace(/[^a-z0-9]/gi, '_')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Téléchargé');
      } catch (e) {
        showToast('Erreur lors du téléchargement');
      } finally {
        wrap.remove();
      }
    }

    // ── Revoir l'animation ───────────────────────────────────────────
    function replayAnimation() {
      if (!currentTicket) return;
      const t = currentTicket;
      window.location.href = `/scan-animation?film=${encodeURIComponent(t.film)}&holo=${t.holo ? 'true' : 'false'}&replay=1`;
    }

    // ── Lightbox affiche ─────────────────────────────────────────────
    function openPosterLightbox(src) {
      if (!src) return;
      document.getElementById('poster-lightbox-img').src = src;
      document.getElementById('poster-lightbox').classList.add('active');
    }
    function closePosterLightbox(e) {
      if (e && e.target.closest('img')) return;
      document.getElementById('poster-lightbox').classList.remove('active');
    }

    // ── Échap pour fermer ────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (document.getElementById('poster-lightbox').classList.contains('active')) closePosterLightbox();
        else if (document.getElementById('ticket-modal').classList.contains('active')) closeTicket();
        else if (document.getElementById('detail-modal').classList.contains('active')) closeDetail();
      }
    });

    // ── Chargement collection ────────────────────────────────────────
    async function charger() {
      const grid = document.getElementById('grid');
      const totalEl = document.getElementById('total');

      try {
        const res = await apiFetch('/api/collections');
        const tickets = await res.json();

        totalEl.textContent = tickets.length;

        if (tickets.length === 0) {
          grid.innerHTML = '<div class="empty"><p>Scanne ton premier ticket !</p></div>';
          return;
        }

        grid.innerHTML = '';
        const ordered = [...tickets].reverse();
        // Préchargement des cartes (avec affiches en parallèle)
        const cards = await Promise.all(ordered.map(async (t, i) => {
          const affiche = await fetchPoster(t.film);
          const img = affiche
            ? `<img src="${affiche}" alt="${escapeHtml(t.film)}">`
            : `<div class="ticket-thumb" style="background:linear-gradient(135deg,#1a1a2e,#0f3460)">🎬</div>`;
          const holo = t.holo ? `<div class="holo-badge">COLLECTOR</div>` : '';
          return `
            <div class="ticket-card" data-idx="${i}">
              ${img}
              ${holo}
              <div class="ticket-info">
                <div class="title">${escapeHtml(t.film)}</div>
                <div class="date">${formatDate(t.date)}</div>
              </div>
            </div>`;
        }));
        grid.innerHTML = cards.join('');
        grid.querySelectorAll('.ticket-card').forEach(el => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx, 10);
            openDetail(ordered[idx]);
          });
        });
      } catch (e) { console.error('Erreur:', e); }
    }

    window.authReady.then(() => charger());
  </script>
</body>
