<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket — Scan</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/auth-init.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px 20px; }
    .logo { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .msg { color: #555; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TakeYourTicket</div>
    <div class="msg" id="msg">Chargement...</div>
  </div>
  <script>
    const ticketId = window.location.pathname.split('/scan-page/')[1];
    const msg = document.getElementById('msg');

    if (!ticketId) {
      msg.textContent = 'Ticket invalide.';
    } else {
      // Mémoriser le ticket si pas connecté — auth-init.js redirigera vers /login
      if (!localStorage.getItem('user')) {
        localStorage.setItem('pendingTicket', ticketId);
      }
      window.authReady.then(async () => {
        localStorage.removeItem('pendingTicket');
        try {
          const res = await apiFetch('/api/scan/' + encodeURIComponent(ticketId), { method: 'POST' });
          const data = await res.json();
          if (!res.ok) {
            msg.textContent = data.error || 'Erreur lors du scan.';
            return;
          }
          window.location.href = `/scan-animation?film=${encodeURIComponent(data.film)}&holo=${data.holo}`;
        } catch (e) {
          msg.textContent = 'Erreur réseau.';
        }
      });
    }
  </script>
</body>
</html>
