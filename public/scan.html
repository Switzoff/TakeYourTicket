<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket — Scan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px 20px; }
    .logo { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .msg { color: #555; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TakeYourTicket</div>
    <div class="msg" id="msg">Chargement...</div>
  </div>
  <script>
    const ticketId = window.location.pathname.split('/scan-page/')[1];
    const user = JSON.parse(localStorage.getItem('user'));
    if (!ticketId) {
      document.getElementById('msg').textContent = 'Ticket invalide.';
    } else if (!user) {
      localStorage.setItem('pendingTicket', ticketId);
      window.location.href = '/login';
    } else {
      window.location.href = '/scan/' + ticketId + '?uid=' + user.uid;
    }
  </script>
</body>
</html>
