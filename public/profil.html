<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket — Profil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 80px; }

    .header { padding: 52px 20px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .avatar-wrap {
      width: 96px; height: 96px; border-radius: 50%;
      background: #222; position: relative; overflow: hidden;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.08);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .avatar-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.2s;
    }
    .avatar-wrap:hover .avatar-overlay,
    .avatar-wrap:active .avatar-overlay { opacity: 1; }

    .username-input {
      background: transparent; border: none; color: #fff;
      font-size: 18px; font-weight: 600; text-align: center; outline: none;
      border-bottom: 1px solid transparent;
      padding: 4px 12px; width: 220px;
      transition: border-color 0.15s;
    }
    .username-input:hover { border-bottom-color: rgba(255,255,255,0.15); }
    .username-input:focus { border-bottom-color: rgba(255,255,255,0.4); }
    .email { font-size: 12px; color: #555; }

    .stats { display: flex; gap: 8px; padding: 0 20px 24px; }
    .stat { flex: 1; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px; padding: 14px 12px; text-align: center; }
    .stat .val { font-size: 24px; font-weight: 500; }
    .stat .lbl { color: #555; font-size: 10px; margin-top: 4px; }

    .section { padding: 0 20px 16px; }
    .section-title { color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 20px;
      padding: 7px 10px 7px 14px; font-size: 12px; color: #ddd;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .chip .x {
      cursor: pointer; color: #666; font-size: 14px; line-height: 1;
      width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: color 0.15s, background 0.15s;
    }
    .chip .x:hover { color: #fff; background: rgba(220, 60, 60, 0.6); }

    .add-btn {
      background: transparent; border: 1px dashed #3a3a3a; border-radius: 20px;
      padding: 6px 12px; font-size: 12px; color: #888; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .add-btn:hover { color: #fff; border-color: #888; }

    .menu-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 14px;
      padding: 16px; margin-bottom: 8px;
      cursor: pointer; color: #fff; text-decoration: none; font-size: 14px;
      width: 100%;
    }
    .menu-item.danger { color: #e55; }
    .menu-item svg { width: 16px; height: 16px; color: #555; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 0.5px solid #1e1e1e;
      display: flex; padding: 12px 0 24px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: #555; font-size: 10px;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; }

    /* Modal de recadrage de photo */
    .crop-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .crop-modal.active { display: flex; }
    .crop-card {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 16px;
      padding: 20px; max-width: 360px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }
    .crop-title { font-size: 14px; font-weight: 600; text-align: center; color: #fff; }
    .crop-hint  { font-size: 11px; text-align: center; color: #666; margin-top: -10px; }
    .crop-frame {
      position: relative; width: 280px; height: 280px; max-width: 100%;
      aspect-ratio: 1; margin: 0 auto;
      background: #000; overflow: hidden; border-radius: 12px;
      touch-action: none; user-select: none; cursor: grab;
    }
    .crop-frame:active { cursor: grabbing; }
    .crop-frame img {
      position: absolute; left: 50%; top: 50%;
      pointer-events: none; user-select: none;
      max-width: none; max-height: none;
    }
    .crop-mask {
      position: absolute; inset: 0; pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .crop-controls { display: flex; align-items: center; gap: 12px; }
    .crop-controls input[type=range] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: #333; border-radius: 2px; outline: none;
    }
    .crop-controls input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer;
    }
    .crop-controls input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      border: none; cursor: pointer;
    }
    .crop-icon { color: #888; font-size: 18px; line-height: 1; user-select: none; }
    .crop-actions { display: flex; gap: 8px; }
    .crop-btn {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .crop-btn.cancel { background: #2a2a2a; color: #fff; }
    .crop-btn.validate { background: #fff; color: #000; }

    /* Modal de recherche de films TMDB */
    .search-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; flex-direction: column;
      padding: env(safe-area-inset-top) 16px 16px;
    }
    .search-modal.active { display: flex; }
    .search-card {
      background: #111; border: 0.5px solid #2a2a2a; border-radius: 16px;
      max-width: 460px; width: 100%; margin: 24px auto 0; padding: 14px;
      flex: 1; display: flex; flex-direction: column; gap: 10px;
      max-height: calc(100vh - 48px); overflow: hidden;
    }
    .search-header {
      display: flex; align-items: center; gap: 8px;
    }
    .search-header input {
      flex: 1; background: #1d1d1d; border: 0.5px solid #2a2a2a;
      color: #fff; font-size: 14px; padding: 12px 14px; border-radius: 10px;
      outline: none;
    }
    .search-header input:focus { border-color: #555; }
    .search-close {
      background: #2a2a2a; border: none; color: #fff;
      width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 16px;
    }
    .search-results {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      overflow-y: auto; padding: 4px 2px 8px; flex: 1;
    }
    .search-empty {
      grid-column: span 3; text-align: center; color: #555;
      font-size: 12px; padding: 40px 20px;
    }
    .film-result {
      background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px;
      overflow: hidden; cursor: pointer; transition: transform 0.1s, border-color 0.15s;
    }
    .film-result:hover, .film-result:active { border-color: #555; transform: scale(0.98); }
    .film-result .poster {
      width: 100%; aspect-ratio: 2/3; background: #222;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .film-result .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .film-result .meta {
      padding: 6px 8px 8px;
    }
    .film-result .meta .title {
      font-size: 11px; font-weight: 600; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .film-result .meta .year { color: #555; font-size: 10px; margin-top: 2px; }

    /* Carrousel de films préférés (vrais posters bien visibles) */
    .fav-row {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: none;
    }
    .fav-row::-webkit-scrollbar { display: none; }
    .fav-film {
      flex-shrink: 0; width: 92px; position: relative;
    }
    .fav-film .poster {
      width: 92px; height: 138px; border-radius: 8px; overflow: hidden;
      background: #1a1a1a; border: 0.5px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .fav-film .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .fav-film .label {
      font-size: 11px; color: #ccc; margin-top: 6px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .fav-film .x {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .fav-film .x:hover { background: rgba(220, 60, 60, 0.8); }
    .fav-add {
      flex-shrink: 0; width: 92px; height: 138px;
      border: 1px dashed #3a3a3a; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #888; cursor: pointer; background: transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .fav-add:hover { color: #fff; border-color: #888; }
    .fav-add .plus { font-size: 24px; line-height: 1; }
    .fav-add small { font-size: 10px; margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }

    /* Modal d'entrée texte (acteurs, etc.) */
    .input-modal {
      position: fixed; inset: 0; z-index: 1100;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 16px;
    }
    .input-modal.active { display: flex; }
    .input-card {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 16px;
      padding: 20px; max-width: 360px; width: 100%;
      display: flex; flex-direction: column; gap: 14px;
    }
    .input-title { font-size: 14px; font-weight: 600; color: #fff; }
    .input-field {
      background: #1d1d1d; border: 0.5px solid #2a2a2a;
      color: #fff; font-size: 14px; padding: 12px 14px; border-radius: 10px;
      outline: none;
    }
    .input-field:focus { border-color: #555; }
    .input-actions { display: flex; gap: 8px; }
    .input-btn {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .input-btn.cancel { background: #2a2a2a; color: #fff; }
    .input-btn.validate { background: #fff; color: #000; }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-wrap" id="avatar-wrap">
      <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
      <img id="avatar-img" alt="" style="display:none">
      <div class="avatar-overlay">Modifier</div>
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none">
    <input type="text" id="username-input" class="username-input" placeholder="Ton nom" maxlength="40">
    <div class="email" id="email"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="total">0</div><div class="lbl">Films vus</div></div>
    <div class="stat"><div class="val" id="mois">0</div><div class="lbl">Ce mois</div></div>
  </div>

  <div class="section">
    <div class="section-title">Films préférés</div>
    <div class="fav-row" id="films-row"></div>
  </div>

  <div class="section">
    <div class="section-title">Acteurs / actrices préférés</div>
    <div class="chips" id="actors-chips"></div>
  </div>

  <div class="section">
    <div class="section-title">Compte</div>
    <button class="menu-item danger" onclick="seDeconnecter()">
      Déconnexion
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>

  <!-- Modal de recherche de films TMDB -->
  <div class="search-modal" id="search-modal">
    <div class="search-card">
      <div class="search-header">
        <input type="text" id="search-input" placeholder="Tape le nom d'un film…" autocomplete="off">
        <button class="search-close" onclick="closeSearchModal()">✕</button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Tape pour chercher un film</div>
      </div>
    </div>
  </div>

  <!-- Modal d'entrée texte (style sombre) -->
  <div class="input-modal" id="input-modal">
    <div class="input-card">
      <div class="input-title" id="input-title">—</div>
      <input type="text" class="input-field" id="input-field" autocomplete="off" maxlength="60">
      <div class="input-actions">
        <button class="input-btn cancel" id="input-cancel">Annuler</button>
        <button class="input-btn validate" id="input-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Modal de recadrage de photo de profil -->
  <div class="crop-modal" id="crop-modal">
    <div class="crop-card">
      <div class="crop-title">Photo de profil</div>
      <div class="crop-frame" id="crop-frame">
        <img id="crop-img">
        <div class="crop-mask"></div>
      </div>
      <div class="crop-hint">Glisse pour positionner — utilise le curseur pour zoomer</div>
      <div class="crop-controls">
        <span class="crop-icon">−</span>
        <input type="range" id="crop-zoom" min="1" max="3" step="0.01" value="1">
        <span class="crop-icon">+</span>
      </div>
      <div class="crop-actions">
        <button class="crop-btn cancel" onclick="cancelCrop()">Annuler</button>
        <button class="crop-btn validate" onclick="validateCrop()">Valider</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Collection
    </a>
    <a href="/scanner" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M3 9V6a1 1 0 0 1 1-1h3M15 5h3a1 1 0 0 1 1 1v3M21 15v3a1 1 0 0 1-1 1h-3M9 19H6a1 1 0 0 1-1-1v-3"/>
      </svg>
      Scanner
    </a>
    <a href="/profil" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profil
    </a>
  </nav>

  <script>
    function seDeconnecter() {
      localStorage.clear();
      window.location.href = '/login';
    }

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = '/login';

    let profile = { displayName: '', photoURL: '', favoriteFilms: [], favoriteActors: [] };

    document.getElementById('email').textContent = user.email || '';

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderChips() {
      const films = document.getElementById('films-row');
      films.innerHTML = profile.favoriteFilms.map((f, i) => {
        const poster = f.poster
          ? `<img src="${escapeHtml(f.poster)}" alt="" loading="lazy">`
          : `🎬`;
        return `
          <div class="fav-film">
            <div class="poster">${poster}</div>
            <div class="label">${escapeHtml(f.title)}</div>
            <span class="x" onclick="removeFilm(${i})" aria-label="Retirer">✕</span>
          </div>`;
      }).join('') + `
        <button class="fav-add" onclick="openSearchModal()" aria-label="Ajouter un film">
          <span class="plus">+</span><small>Ajouter</small>
        </button>`;

      const actors = document.getElementById('actors-chips');
      actors.innerHTML = profile.favoriteActors.map((a, i) =>
        `<span class="chip">${escapeHtml(a)}<span class="x" onclick="removeActor(${i})">✕</span></span>`
      ).join('') + `<button class="add-btn" onclick="addActor()">+ Ajouter</button>`;
    }

    function normalizeFilm(f) {
      // Compat avec l'ancien format (string)
      if (typeof f === 'string') return { title: f, poster: null };
      return { title: f.title || '', poster: f.poster || null };
    }

    async function loadProfile() {
      try {
        const r = await fetch(`/api/profile?uid=${user.uid}`);
        const d = await r.json();
        profile = {
          displayName: d.displayName ?? user.displayName ?? '',
          photoURL: d.photoURL ?? user.photoURL ?? '',
          favoriteFilms: (d.favoriteFilms ?? []).map(normalizeFilm),
          favoriteActors: d.favoriteActors ?? [],
        };
      } catch (e) {
        profile = {
          displayName: user.displayName || '',
          photoURL: user.photoURL || '',
          favoriteFilms: [], favoriteActors: [],
        };
      }
      document.getElementById('username-input').value = profile.displayName;
      if (profile.photoURL) {
        const img = document.getElementById('avatar-img');
        img.src = profile.photoURL;
        img.style.display = 'block';
        document.getElementById('avatar-placeholder').style.display = 'none';
      }
      renderChips();
    }

    async function saveProfile() {
      try {
        await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            uid: user.uid,
            displayName: profile.displayName,
            photoURL: profile.photoURL,
            favoriteFilms: profile.favoriteFilms,
            favoriteActors: profile.favoriteActors,
          }),
        });
      } catch (e) { console.error(e); }
    }

    // Username
    const usernameInput = document.getElementById('username-input');
    usernameInput.addEventListener('change', async () => {
      profile.displayName = usernameInput.value.trim();
      await saveProfile();
    });
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') usernameInput.blur();
    });

    // Photo : ouvrir le sélecteur, puis le modal de recadrage
    document.getElementById('avatar-wrap').addEventListener('click', () => {
      document.getElementById('photo-input').click();
    });
    document.getElementById('photo-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => openCropModal(reader.result);
      reader.readAsDataURL(file);
    });

    // ── ÉDITEUR DE RECADRAGE ─────────────────────────────────────────────
    const FRAME = 280;       // taille du cadre de recadrage à l'écran
    const OUT_SIZE = 256;    // taille finale de la photo de profil
    const cropState = { tx: 0, ty: 0, s: 1, sBase: 1 };
    const cropImg = document.getElementById('crop-img');
    const cropFrame = document.getElementById('crop-frame');
    const cropZoom = document.getElementById('crop-zoom');

    function applyCropTransform() {
      const total = cropState.s * cropState.sBase;
      cropImg.style.transform =
        `translate(-50%, -50%) translate(${cropState.tx}px, ${cropState.ty}px) scale(${total})`;
    }

    function clampOffset() {
      const total = cropState.s * cropState.sBase;
      const halfImgW = (cropImg.naturalWidth  * total) / 2;
      const halfImgH = (cropImg.naturalHeight * total) / 2;
      const halfFrame = FRAME / 2;
      const maxTx = Math.max(0, halfImgW - halfFrame);
      const maxTy = Math.max(0, halfImgH - halfFrame);
      cropState.tx = Math.max(-maxTx, Math.min(maxTx, cropState.tx));
      cropState.ty = Math.max(-maxTy, Math.min(maxTy, cropState.ty));
    }

    function openCropModal(dataURL) {
      cropImg.onload = () => {
        cropState.sBase = Math.max(
          FRAME / cropImg.naturalWidth,
          FRAME / cropImg.naturalHeight
        );
        cropState.s = 1;
        cropState.tx = 0;
        cropState.ty = 0;
        cropZoom.value = 1;
        applyCropTransform();
      };
      cropImg.src = dataURL;
      document.getElementById('crop-modal').classList.add('active');
    }

    function cancelCrop() {
      document.getElementById('crop-modal').classList.remove('active');
      document.getElementById('photo-input').value = '';
    }

    async function validateCrop() {
      const total = cropState.s * cropState.sBase;
      const srcSize = FRAME / total;
      const srcX = cropImg.naturalWidth  / 2 - cropState.tx / total - srcSize / 2;
      const srcY = cropImg.naturalHeight / 2 - cropState.ty / total - srcSize / 2;

      const canvas = document.createElement('canvas');
      canvas.width = OUT_SIZE; canvas.height = OUT_SIZE;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(cropImg, srcX, srcY, srcSize, srcSize, 0, 0, OUT_SIZE, OUT_SIZE);
      const dataURL = canvas.toDataURL('image/jpeg', 0.85);

      profile.photoURL = dataURL;
      const aImg = document.getElementById('avatar-img');
      aImg.src = dataURL;
      aImg.style.display = 'block';
      document.getElementById('avatar-placeholder').style.display = 'none';

      cancelCrop();
      await saveProfile();
    }

    // Drag pour repositionner
    let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;
    cropFrame.addEventListener('pointerdown', (e) => {
      if (cropFrame.setPointerCapture) cropFrame.setPointerCapture(e.pointerId);
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      startTx = cropState.tx; startTy = cropState.ty;
    });
    cropFrame.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      cropState.tx = startTx + (e.clientX - startX);
      cropState.ty = startTy + (e.clientY - startY);
      clampOffset();
      applyCropTransform();
    });
    function endDrag() { dragging = false; }
    cropFrame.addEventListener('pointerup', endDrag);
    cropFrame.addEventListener('pointercancel', endDrag);
    cropFrame.addEventListener('pointerleave', endDrag);

    // Zoom curseur
    cropZoom.addEventListener('input', () => {
      cropState.s = parseFloat(cropZoom.value);
      clampOffset();
      applyCropTransform();
    });

    // Pinch to zoom (mobile, à 2 doigts)
    let pinchStartDist = 0, pinchStartScale = 1;
    cropFrame.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const [t1, t2] = e.touches;
        pinchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        pinchStartScale = cropState.s;
      }
    }, { passive: false });
    cropFrame.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const [t1, t2] = e.touches;
        const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        cropState.s = Math.max(1, Math.min(3, pinchStartScale * (dist / pinchStartDist)));
        cropZoom.value = cropState.s;
        clampOffset();
        applyCropTransform();
      }
    }, { passive: false });

    // ── RECHERCHE TMDB DE FILMS ──────────────────────────────────────────
    const searchModal  = document.getElementById('search-modal');
    const searchInput  = document.getElementById('search-input');
    const searchResults= document.getElementById('search-results');
    let searchTimer = null;

    function openSearchModal() {
      searchInput.value = '';
      searchResults.innerHTML = `<div class="search-empty">Tape pour chercher un film</div>`;
      searchModal.classList.add('active');
      setTimeout(() => searchInput.focus(), 50);
    }
    function closeSearchModal() {
      searchModal.classList.remove('active');
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      clearTimeout(searchTimer);
      if (q.length < 2) {
        searchResults.innerHTML = `<div class="search-empty">Tape pour chercher un film</div>`;
        return;
      }
      searchTimer = setTimeout(() => doSearch(q), 280);
    });

    async function doSearch(q) {
      searchResults.innerHTML = `<div class="search-empty">Recherche…</div>`;
      try {
        const r = await fetch(`/api/recherche-films?q=${encodeURIComponent(q)}`);
        const list = await r.json();
        if (!list.length) {
          searchResults.innerHTML = `<div class="search-empty">Aucun résultat</div>`;
          return;
        }
        searchResults.innerHTML = list.map((f, i) => {
          const poster = f.poster
            ? `<img src="${escapeHtml(f.poster)}" alt="" loading="lazy">`
            : `🎬`;
          return `
            <div class="film-result" data-index="${i}">
              <div class="poster">${poster}</div>
              <div class="meta">
                <div class="title">${escapeHtml(f.title)}</div>
                <div class="year">${escapeHtml(f.year)}</div>
              </div>
            </div>`;
        }).join('');
        // Click -> ajout
        searchResults.querySelectorAll('.film-result').forEach((el) => {
          el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.index, 10);
            pickFilm(list[idx]);
          });
        });
      } catch (e) {
        searchResults.innerHTML = `<div class="search-empty">Erreur de recherche</div>`;
      }
    }

    async function pickFilm(film) {
      profile.favoriteFilms.push({ title: film.title, poster: film.poster });
      renderChips();
      closeSearchModal();
      await saveProfile();
    }

    async function removeFilm(i) {
      profile.favoriteFilms.splice(i, 1);
      renderChips(); await saveProfile();
    }
    // Mini modal d'entrée texte sombre
    function askInput(title, placeholder = '') {
      return new Promise((resolve) => {
        const modal = document.getElementById('input-modal');
        const field = document.getElementById('input-field');
        const cancelBtn = document.getElementById('input-cancel');
        const okBtn = document.getElementById('input-ok');
        document.getElementById('input-title').textContent = title;
        field.value = '';
        field.placeholder = placeholder;
        modal.classList.add('active');
        setTimeout(() => field.focus(), 50);

        const close = (val) => {
          modal.classList.remove('active');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          field.removeEventListener('keydown', onKey);
          resolve(val);
        };
        const onOk = () => close(field.value.trim());
        const onCancel = () => close(null);
        const onKey = (e) => {
          if (e.key === 'Enter') onOk();
          else if (e.key === 'Escape') onCancel();
        };
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        field.addEventListener('keydown', onKey);
      });
    }

    async function addActor() {
      const name = await askInput('Acteur ou actrice préféré(e)', 'ex. Tom Holland');
      if (!name) return;
      profile.favoriteActors.push(name);
      renderChips(); await saveProfile();
    }
    async function removeActor(i) {
      profile.favoriteActors.splice(i, 1);
      renderChips(); await saveProfile();
    }

    // Stats
    async function loadStats() {
      try {
        const res = await fetch(`/api/collections?uid=${user.uid}`);
        const tickets = await res.json();
        document.getElementById('total').textContent = tickets.length;
        const now = new Date();
        document.getElementById('mois').textContent = tickets.filter(t => {
          const d = new Date(t.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).length;
      } catch (e) { console.error(e); }
    }

    loadProfile();
    loadStats();
  </script>
</body>
</html>
