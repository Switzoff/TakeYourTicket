<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TakeYourTicket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .flash {
      position: fixed; inset: 0; background: white; z-index: 100;
      animation: flash 0.5s ease-out both;
      pointer-events: none;
    }
    @keyframes flash { 0% { opacity: 0.8; } 100% { opacity: 0; } }

    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(16px, 3vh, 24px);
      padding: 0 16px;
    }

    .ticket-wrap {
      width: clamp(180px, 55vmin, 260px);
      aspect-ratio: 160 / 220;
      border-radius: clamp(14px, 2.5vmin, 18px); overflow: hidden;
      position: relative;
      box-shadow: 0 0 40px rgba(180,0,0,0.0), 0 8px 32px rgba(0,0,0,0.7);
      transform-origin: top center;
    }
    /* Spider-Man : carte qui descend accrochée à la toile */
    .ticket-wrap[data-theme="spiderman"] {
      animation: webDrop 1.6s cubic-bezier(0.42, 0.05, 0.3, 1.25) both, dangle 3.5s ease-in-out infinite;
      animation-delay: 0s, 1.7s;
      box-shadow: 0 0 40px rgba(180,0,0,0.4), 0 0 80px rgba(0,50,180,0.25), 0 8px 32px rgba(0,0,0,0.75);
    }
    @keyframes webDrop {
      0%   { transform: translateY(-100vh) scale(0.85); opacity: 0; }
      6%   { opacity: 1; }
      72%  { transform: translateY(2vh) scale(1.04); }
      88%  { transform: translateY(-0.5vh) scale(0.98); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes dangle {
      0%,100% { transform: rotate(-1deg); }
      50%     { transform: rotate(1deg); }
    }
    /* Autres thèmes : apparition rebondie */
    .ticket-wrap:not([data-theme="spiderman"]) {
      animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay: 0.3s;
      box-shadow: 0 0 60px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.7);
    }
    @keyframes cardIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .ticket-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ticket-placeholder {
      width: 100%; height: 100%; background: #111;
      display: flex; align-items: center; justify-content: center; font-size: 52px;
    }
    .shimmer {
      position: absolute; inset: 0; border-radius: 14px; z-index: 3;
      background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: shimmer 2.5s ease-in-out infinite; animation-delay: 1.5s;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%  { background-position: -100% -100%; }
      50% { background-position:  100%  100%; }
      100%{ background-position: -100% -100%; }
    }

    .title-group {
      text-align: center;
      animation: fadeUp 0.6s ease both; animation-delay: 1.1s;
    }
    [data-theme-root="spiderman"] .title-group { animation-delay: 1.7s; }

    .title-label { font-size: clamp(10px, 1.4vmin, 12px); letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .film-title  { font-size: clamp(20px, 3vmin, 26px); font-weight: 700; letter-spacing: 0.5px; line-height: 1.2; }
    .holo-tag {
      display: inline-block; margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      padding: 4px 14px; font-size: clamp(10px, 1.3vmin, 11px); letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
      animation: pulse 2s ease-in-out infinite; animation-delay: 1.7s;
    }
    [data-theme-root="spiderman"] .holo-tag { animation-delay: 2.3s; }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .added-msg {
      font-size: clamp(13px, 1.7vmin, 15px); color: #4caf50; letter-spacing: 1px;
      animation: fadeUp 0.5s ease both; animation-delay: 1.4s;
    }
    [data-theme-root="spiderman"] .added-msg { animation-delay: 2s; }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flash"></div>

  <div class="scene">
    <div class="ticket-wrap" id="card">
      <img id="poster" alt="" style="display:none">
      <div class="ticket-placeholder" id="placeholder">🎬</div>
      <div class="shimmer"></div>
    </div>
    <div class="title-group">
      <div class="title-label">Ticket collector</div>
      <div class="film-title" id="filmTitle">—</div>
      <div class="holo-tag" id="holoTag" style="display:none">✦ Holo</div>
    </div>
    <div class="added-msg">✓ Ajouté à ta collection</div>
  </div>

  <script>
  // ── PARAMS ──────────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const film = params.get('film') || 'Film';
  const holo = params.get('holo') === 'true';

  document.getElementById('filmTitle').textContent = film;
  if (holo) document.getElementById('holoTag').style.display = 'inline-block';

  fetch('/api/affiche/' + encodeURIComponent(film))
    .then(r => r.json())
    .then(d => {
      if (d.affiche) {
        const img = document.getElementById('poster');
        img.onload = () => { img.style.display='block'; document.getElementById('placeholder').style.display='none'; };
        img.src = d.affiche;
      }
    }).catch(() => {});

  // ── CANVAS ──────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, CX, CY;
  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    CX = W/2; CY = H/2;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', resizeCanvas);

  function rnd(a, b) { return a + Math.random() * (b - a); }

  // ── DÉTECTION DU FILM ────────────────────────────────────────────────────────
  const fn = film.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  let theme = 'default';
  if (/spider.?man/.test(fn))                                                   theme = 'spiderman';
  else if (/\bmario\b/.test(fn))                                                theme = 'mario';
  else if (/batman|dark.?knight/.test(fn))                                      theme = 'batman';
  else if (/star.?wars|jedi|sith|skywalker|mandalorian|rogue.?one/.test(fn))   theme = 'starwars';
  else if (/harry.?potter|hogwarts|fantastic.?beasts/.test(fn))                 theme = 'harrypotter';
  else if (/iron.?man|avengers|thor|captain.?america|black.?panther|doctor.?strange/.test(fn)) theme = 'marvel';
  else if (/frozen|encanto|moana|toy.?story|coco/.test(fn))                    theme = 'pixar';
  else if (/jurassic|dinosaur/.test(fn))                                        theme = 'jurassic';

  // Attacher le thème à la carte + au body pour déclencher les bonnes animations CSS
  document.getElementById('card').setAttribute('data-theme', theme);
  document.body.setAttribute('data-theme-root', theme);
  const cardEl = document.getElementById('card');

  // ════════════════════════════════════════════════════════════════════════════
  // ANIMATIONS
  // ════════════════════════════════════════════════════════════════════════════

  // ── DEFAULT : particules holographiques ──────────────────────────────────────
  function animDefault() {
    const COLS = ['#ff0066','#ff6b00','#ffe600','#00ff88','#00b4ff','#8b00ff','#fff'];
    const pts  = Array.from({length:100}, () => ({
      x:Math.random()*W, y:H+Math.random()*200,
      r:rnd(0.5,3), vy:rnd(0.5,2), vx:rnd(-0.4,0.4),
      c:COLS[Math.floor(Math.random()*COLS.length)],
      a:rnd(0.2,0.8), d:Math.random()*60,
    }));
    let f=0;
    (function loop() {
      ctx.clearRect(0,0,W,H);
      for (const p of pts) {
        if (f<p.d) continue;
        p.y-=p.vy; p.x+=p.vx; p.a-=0.0015;
        if (p.y<-10||p.a<=0) { p.y=H+10; p.x=Math.random()*W; p.a=rnd(0.2,0.8); }
        ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; f++;
      requestAnimationFrame(loop);
    })();
  }

  // ── SPIDER-MAN : toile verticale + carte qui descend ────────────────────────
  function animSpiderman() {
    document.body.style.background = '#050408';

    const dust = Array.from({length:40}, () => ({
      x:Math.random()*W, y:Math.random()*H,
      r:rnd(0.3,1.5), vy:rnd(0.05,0.25), vx:rnd(-0.08,0.08), a:rnd(0.1,0.5),
    }));
    const beads = Array.from({length:12}, () => ({
      t:Math.random(), off:(Math.random()-0.5)*4, r:rnd(0.7,2.1),
    }));

    const SPOKES_START = 100;
    const SPOKES = 22;
    // Anneaux proportionnels à la taille de l'écran (vmin = plus petite dimension)
    const VMIN = Math.min(W, H);
    const RINGS = [0.07, 0.14, 0.22, 0.30, 0.40, 0.50, 0.62, 0.75].map(p => p * VMIN);
    const RINGS_START = SPOKES_START + SPOKES*2 + 8;
    const angles = Array.from({length:SPOKES}, (_,i)=>(i/SPOKES)*Math.PI*2 - Math.PI/2);
    const spokeP = new Float32Array(SPOKES);
    const ringP  = new Float32Array(RINGS.length);

    function edgeDist(a) {
      const ca=Math.abs(Math.cos(a)), sa=Math.abs(Math.sin(a));
      const fw = ca<0.001 ? Infinity : (Math.cos(a)>0 ? W-CX : CX)/ca;
      const fh = sa<0.001 ? Infinity : (Math.sin(a)>0 ? H-CY : CY)/sa;
      return Math.min(fw,fh)*1.08;
    }

    function drawStrand(tipX, tipY, f) {
      if (tipY < -20) return;
      // Épaisseurs proportionnelles
      const wGlow = Math.max(8, VMIN * 0.022);
      const wMain = Math.max(3.2, VMIN * 0.009);
      const wCore = Math.max(1.2, VMIN * 0.0035);

      const glow = ctx.createLinearGradient(tipX,-30,tipX,tipY);
      glow.addColorStop(0,'rgba(180,220,255,0.22)'); glow.addColorStop(1,'rgba(180,220,255,0.12)');
      ctx.strokeStyle=glow; ctx.lineWidth=wGlow; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(tipX,-30); ctx.lineTo(tipX,tipY); ctx.stroke();

      ctx.strokeStyle='rgba(245,250,255,0.95)'; ctx.lineWidth=wMain;
      ctx.beginPath(); ctx.moveTo(tipX,-30); ctx.lineTo(tipX,tipY); ctx.stroke();

      ctx.strokeStyle='rgba(255,255,255,1)'; ctx.lineWidth=wCore;
      ctx.beginPath(); ctx.moveTo(tipX,-30); ctx.lineTo(tipX,tipY); ctx.stroke();

      ctx.strokeStyle='rgba(220,235,255,0.35)'; ctx.lineWidth=0.6;
      const segLen = tipY+30;
      const n = Math.min(30, Math.floor(segLen/18));
      for (let i=0;i<n;i++) {
        const y = -30 + segLen*(i/n);
        const w = Math.sin(i*1.7 + f*0.08)*3 + 1;
        ctx.beginPath(); ctx.moveTo(tipX-w,y); ctx.lineTo(tipX+w,y); ctx.stroke();
      }

      for (const b of beads) {
        const y = -30 + segLen*b.t;
        if (y > tipY) continue;
        ctx.fillStyle='rgba(255,255,255,1)';
        ctx.beginPath(); ctx.arc(tipX+b.off, y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(180,220,255,0.3)';
        ctx.beginPath(); ctx.arc(tipX+b.off, y, b.r*2.2, 0, Math.PI*2); ctx.fill();
      }
    }

    function drawSplay(tipX, tipY) {
      if (tipY < -10) return;
      const FINGERS = 7, spread = Math.PI*0.85, maxLen = Math.max(50, VMIN * 0.13);
      const fingers = [
        {L:0.95,c: 3},{L:0.80,c:-4},{L:1.00,c: 2},{L:0.70,c: 5},
        {L:0.88,c:-3},{L:0.75,c: 4},{L:0.92,c:-2},
      ];
      ctx.strokeStyle='rgba(240,248,255,0.85)'; ctx.lineWidth=1.2; ctx.lineCap='round';
      for (let i=0;i<FINGERS;i++) {
        const t=i/(FINGERS-1), angle=Math.PI/2+(t-0.5)*spread;
        const L=maxLen*fingers[i].L;
        const ex=tipX+Math.cos(angle)*L, ey=tipY+Math.sin(angle)*L;
        const mx=tipX+Math.cos(angle)*L*0.55+fingers[i].c;
        const my=tipY+Math.sin(angle)*L*0.55;
        ctx.beginPath(); ctx.moveTo(tipX,tipY); ctx.quadraticCurveTo(mx,my,ex,ey); ctx.stroke();
      }
      ctx.strokeStyle='rgba(220,235,255,0.35)'; ctx.lineWidth=0.5;
      for (let ring=0;ring<3;ring++) {
        const r = maxLen*(0.4 + ring*0.2);
        ctx.beginPath();
        for (let i=0;i<FINGERS;i++) {
          const t=i/(FINGERS-1), angle=Math.PI/2+(t-0.5)*spread;
          const x=tipX+Math.cos(angle)*r, y=tipY+Math.sin(angle)*r;
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    }

    function drawRadialWeb(f) {
      // Centrer la toile sur la carte (pas sur le milieu du canvas)
      const rect = cardEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      function edgeDistFrom(a, px, py) {
        const ca=Math.abs(Math.cos(a)), sa=Math.abs(Math.sin(a));
        const fw = ca<0.001 ? Infinity : (Math.cos(a)>0 ? W-px : px)/ca;
        const fh = sa<0.001 ? Infinity : (Math.sin(a)>0 ? H-py : py)/sa;
        return Math.min(fw,fh)*1.08;
      }

      for (let i=0;i<SPOKES;i++) {
        const sf = SPOKES_START + i*2;
        if (f>=sf) spokeP[i] = Math.min(1, (f-sf)/24);
      }
      for (let i=0;i<RINGS.length;i++) {
        const sf = RINGS_START + i*11;
        if (f>=sf) ringP[i] = Math.min(1, (f-sf)/30);
      }
      ctx.lineWidth=0.7;
      for (let i=0;i<SPOKES;i++) {
        if (spokeP[i]<=0) continue;
        const len = edgeDistFrom(angles[i], cx, cy)*spokeP[i];
        ctx.strokeStyle=`rgba(200,210,255,${0.38*spokeP[i]})`;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(angles[i])*len, cy+Math.sin(angles[i])*len);
        ctx.stroke();
      }
      ctx.lineWidth=0.55;
      for (let ri=0;ri<RINGS.length;ri++) {
        if (ringP[ri]<=0) continue;
        const r=RINGS[ri], alpha=Math.min(0.4, ringP[ri]*0.8);
        ctx.strokeStyle=`rgba(200,215,255,${alpha})`;
        const segs = Math.floor(SPOKES*ringP[ri]);
        ctx.beginPath();
        for (let i=0;i<=segs;i++) {
          const ai = i%SPOKES;
          if (r > edgeDistFrom(angles[ai], cx, cy)) continue;
          const px = cx+Math.cos(angles[ai])*r, py = cy+Math.sin(angles[ai])*r;
          i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        if (ringP[ri]>=1 && r<=edgeDistFrom(angles[0], cx, cy)) {
          ctx.lineTo(cx+Math.cos(angles[0])*r, cy+Math.sin(angles[0])*r);
        }
        ctx.stroke();
      }
    }

    let frame = 0;
    (function loop() {
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#050408'; ctx.fillRect(0,0,W,H);

      // Poussière
      for (const d of dust) {
        d.y+=d.vy; d.x+=d.vx;
        if (d.y>H) d.y=0;
        if (d.x>W) d.x=0; if (d.x<0) d.x=W;
        ctx.globalAlpha=d.a; ctx.fillStyle='#ffffff';
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;

      // Suivre la position réelle de la carte
      const rect = cardEl.getBoundingClientRect();
      const tipX = rect.left + rect.width/2;
      const tipY = rect.top;

      drawStrand(tipX, tipY, frame);
      drawSplay(tipX, tipY);
      drawRadialWeb(frame);

      frame++;
      requestAnimationFrame(loop);
    })();
  }

  // ── MARIO : étoiles + pièces ─────────────────────────────────────────────────
  function animMario() {
    document.body.style.background = '#000d20';

    function drawStar(x,y,r,rot,col,a) {
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
      ctx.globalAlpha=a; ctx.fillStyle=col; ctx.beginPath();
      for (let i=0;i<10;i++) {
        const ang=(i*Math.PI)/5-Math.PI/2, rad=i%2===0?r:r*0.4;
        i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);
      }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
    function drawCoin(x,y,sc,ph,a) {
      const w=Math.max(1,13*sc*Math.abs(Math.cos(ph))), h=20*sc;
      ctx.globalAlpha=a; ctx.fillStyle='#ffe000';
      ctx.beginPath(); ctx.ellipse(x,y,w,h,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#bb8800';
      ctx.beginPath(); ctx.ellipse(x,y,Math.max(0.5,w*0.5),h*0.6,0,0,Math.PI*2); ctx.fill();
    }

    const stars = Array.from({length:60}, () => ({
      x:Math.random()*W, y:H+Math.random()*200,
      r:rnd(4,11), rot:Math.random()*Math.PI*2, rs:(Math.random()-0.5)*0.1,
      vy:rnd(1,3), vx:rnd(-1.5,1.5), a:rnd(0.3,0.9),
      c:Math.random()>0.3?'#ffe000':(Math.random()>0.5?'#fff':'#ff9900'),
    }));
    const coins = Array.from({length:20}, () => ({
      x:Math.random()*W, y:H+Math.random()*300,
      sc:rnd(0.4,0.9), ph:Math.random()*Math.PI*2,
      vy:rnd(1,2.5), vx:rnd(-0.8,0.8), a:0.85,
    }));

    (function loop() {
      ctx.clearRect(0,0,W,H);
      const g=ctx.createRadialGradient(CX,CY,0,CX,CY,320);
      g.addColorStop(0,'rgba(255,200,0,0.07)'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      for (const s of stars) {
        s.y-=s.vy; s.x+=s.vx; s.rot+=s.rs; s.a-=0.0018;
        if(s.y<-20||s.a<=0){s.y=H+20;s.x=Math.random()*W;s.a=rnd(0.3,0.9);}
        drawStar(s.x,s.y,s.r,s.rot,s.c,s.a);
      }
      for (const c of coins) {
        c.y-=c.vy; c.x+=c.vx; c.ph+=0.13;
        if(c.y<-30){c.y=H+30;c.x=Math.random()*W;}
        drawCoin(c.x,c.y,c.sc,c.ph,c.a);
      }
      ctx.globalAlpha=1;
      requestAnimationFrame(loop);
    })();
  }

  // ── BATMAN : chauves-souris + bat signal ─────────────────────────────────────
  function animBatman() {
    document.body.style.background = '#030303';
    const bats = Array.from({length:20}, () => ({
      x:Math.random()*W, y:Math.random()*H,
      vx:(rnd(1.5,3))*(Math.random()>0.5?1:-1), vy:rnd(-0.8,0.8),
      sc:rnd(0.3,0.65), wing:Math.random()*Math.PI*2, ws:0.11+Math.random()*0.08,
      a:rnd(0.3,0.6),
    }));
    let sigA=0;

    function drawBat(b) {
      ctx.save(); ctx.translate(b.x,b.y); ctx.scale(b.sc,b.sc);
      if(b.vx<0) ctx.scale(-1,1);
      ctx.globalAlpha=b.a; ctx.fillStyle='#0a0a0a';
      const w=Math.sin(b.wing);
      ctx.beginPath(); ctx.ellipse(0,1,6,4,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-8,-4,-18,w*10,-26,w*8); ctx.bezierCurveTo(-18,w*14,-8,6,0,4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(8,-4,18,w*10,26,w*8);  ctx.bezierCurveTo(18,w*14,8,6,0,4);  ctx.fill();
      ctx.beginPath(); ctx.moveTo(-3,-3); ctx.lineTo(-5,-11); ctx.lineTo(-1,-3); ctx.fill();
      ctx.beginPath(); ctx.moveTo(3,-3);  ctx.lineTo(5,-11);  ctx.lineTo(1,-3);  ctx.fill();
      ctx.restore();
    }

    (function loop() {
      ctx.clearRect(0,0,W,H);
      sigA = Math.min(0.2,sigA+0.003);
      const g=ctx.createRadialGradient(CX,CY,0,CX,CY,H*0.6);
      g.addColorStop(0,`rgba(240,200,0,${sigA})`); g.addColorStop(0.5,`rgba(180,140,0,${sigA*0.35})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle=`rgba(255,200,0,${sigA*3})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(CX,CY,68,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(CX,CY,88,0,Math.PI*2); ctx.stroke();
      for (const b of bats) {
        b.x+=b.vx; b.y+=b.vy; b.wing+=b.ws;
        if(b.x<-80)b.x=W+80; if(b.x>W+80)b.x=-80;
        if(b.y<-30)b.y=H+30; if(b.y>H+30)b.y=-30;
        drawBat(b);
      }
      ctx.globalAlpha=1;
      requestAnimationFrame(loop);
    })();
  }

  // ── STAR WARS : hyperspace ───────────────────────────────────────────────────
  function animStarwars() {
    document.body.style.background = '#000005';
    const lines = Array.from({length:220}, () => {
      const a=Math.random()*Math.PI*2;
      return { angle:a, dist:Math.random()*25+5, spd:rnd(3,10),
               c:Math.random()>0.6?'#fff':(Math.random()>0.5?'#aabbff':'#ffe8aa'),
               a:rnd(0.2,1) };
    });
    let t=0;
    const SABER=[[0,120,255],[255,40,40],[0,200,80]];
    (function loop() {
      ctx.fillStyle='rgba(0,0,5,0.28)'; ctx.fillRect(0,0,W,H);
      for (const l of lines) {
        const d=l.dist+l.spd*t*0.5;
        if(d>Math.hypot(W,H)){l.dist=Math.random()*20; continue;}
        const nd=d+l.spd*4;
        ctx.globalAlpha=Math.min(1,l.a*(d/250));
        ctx.strokeStyle=l.c; ctx.lineWidth=Math.min(2.5,d/80);
        ctx.beginPath();
        ctx.moveTo(CX+Math.cos(l.angle)*d, CY+Math.sin(l.angle)*d);
        ctx.lineTo(CX+Math.cos(l.angle)*nd,CY+Math.sin(l.angle)*nd);
        ctx.stroke();
      }
      const sc=SABER[Math.floor(t/80)%3];
      const g=ctx.createRadialGradient(CX,CY,0,CX,CY,160);
      g.addColorStop(0,`rgba(${sc},0.13)`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=1; ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      t++; requestAnimationFrame(loop);
    })();
  }

  // ── HARRY POTTER : étincelles dorées ────────────────────────────────────────
  function animHarryPotter() {
    document.body.style.background = '#02000e';
    const sparks = Array.from({length:90}, () => ({
      x:CX+(Math.random()-0.5)*100, y:CY+(Math.random()-0.5)*100,
      angle:Math.random()*Math.PI*2, spd:rnd(1,4),
      life:Math.random(), maxL:rnd(0.3,0.8), r:rnd(0.5,2.5),
      c:Math.random()>0.5?'#ffd700':(Math.random()>0.5?'#ff8800':'#ffeeaa'),
      trail:[],
    }));
    const bgDots = Array.from({length:70}, () => ({
      x:Math.random()*W, y:Math.random()*H, r:rnd(0.3,1.2), spd:rnd(0.005,0.025),
    }));
    (function loop() {
      ctx.fillStyle='rgba(2,0,14,0.22)'; ctx.fillRect(0,0,W,H);
      for (const d of bgDots) {
        const a=Math.abs(Math.sin(Date.now()*d.spd*0.001+d.x))*0.35;
        ctx.globalAlpha=a; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
      }
      const g=ctx.createRadialGradient(CX,CY,0,CX,CY,260);
      g.addColorStop(0,'rgba(120,0,200,0.09)'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=1; ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      for (const s of sparks) {
        s.x+=Math.cos(s.angle)*s.spd; s.y+=Math.sin(s.angle)*s.spd+0.04;
        s.spd*=0.984; s.life-=0.013;
        s.trail.push({x:s.x,y:s.y}); if(s.trail.length>10) s.trail.shift();
        if(s.life<=0){
          s.x=CX+(Math.random()-0.5)*130; s.y=CY+(Math.random()-0.5)*130;
          s.angle=Math.random()*Math.PI*2; s.spd=rnd(1.5,4);
          s.life=s.maxL; s.trail=[];
        }
        for(let i=0;i<s.trail.length-1;i++){
          ctx.globalAlpha=(i/s.trail.length)*s.life*0.85;
          ctx.strokeStyle=s.c; ctx.lineWidth=s.r*(0.3+i/s.trail.length);
          ctx.beginPath(); ctx.moveTo(s.trail[i].x,s.trail[i].y); ctx.lineTo(s.trail[i+1].x,s.trail[i+1].y); ctx.stroke();
        }
        ctx.globalAlpha=s.life; ctx.fillStyle=s.c;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; requestAnimationFrame(loop);
    })();
  }

  // ── MARVEL : arc reactor ─────────────────────────────────────────────────────
  function animMarvel() {
    document.body.style.background = '#000510';
    const rings = Array.from({length:6}, (_,i) => ({
      r:50+i*40, angle:i*(Math.PI/3), spd:(i%2===0?1:-1)*0.018, a:0.22+i*0.04,
    }));
    const pts = Array.from({length:130}, () => {
      const a=Math.random()*Math.PI*2;
      return { x:CX,y:CY, vx:Math.cos(a)*rnd(0.5,4), vy:Math.sin(a)*rnd(0.5,4),
               a:rnd(0.2,0.9), r:rnd(0.5,2.5),
               c:Math.random()>0.5?'#00b4ff':(Math.random()>0.5?'#8888ff':'#ffd700'),
               life:Math.random() };
    });
    (function loop() {
      ctx.fillStyle='rgba(0,5,16,0.22)'; ctx.fillRect(0,0,W,H);
      for (const ring of rings) {
        ring.angle+=ring.spd;
        ctx.save(); ctx.translate(CX,CY); ctx.rotate(ring.angle);
        ctx.strokeStyle=`rgba(0,180,255,${ring.a})`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(0,0,ring.r,0,Math.PI*1.85); ctx.stroke();
        for(let i=0;i<3;i++){
          const a=(i/3)*Math.PI*2;
          ctx.fillStyle=`rgba(0,220,255,${ring.a*2})`;
          ctx.beginPath(); ctx.arc(Math.cos(a)*ring.r,Math.sin(a)*ring.r,2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      for (const p of pts) {
        p.x+=p.vx; p.y+=p.vy; p.life-=0.009;
        if(p.life<=0){
          p.x=CX; p.y=CY; const a=Math.random()*Math.PI*2;
          p.vx=Math.cos(a)*rnd(0.5,4); p.vy=Math.sin(a)*rnd(0.5,4);
          p.life=rnd(0.2,0.9);
        }
        ctx.globalAlpha=p.life*p.a; ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; requestAnimationFrame(loop);
    })();
  }

  // ── GÉNÉRIQUE PARTICULES (Pixar, Jurassic) ───────────────────────────────────
  function animParticles(bg, cols, glow) {
    document.body.style.background = bg;
    const pts = Array.from({length:100}, () => ({
      x:Math.random()*W, y:H+Math.random()*200,
      r:rnd(0.5,3), vy:rnd(0.8,2.2), vx:rnd(-0.8,0.8),
      c:cols[Math.floor(Math.random()*cols.length)],
      a:rnd(0.2,0.8), d:Math.random()*50,
    }));
    let f=0;
    (function loop() {
      ctx.clearRect(0,0,W,H);
      const g=ctx.createRadialGradient(CX,CY,0,CX,CY,300);
      g.addColorStop(0,glow); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      for(const p of pts){
        if(f<p.d)continue;
        p.y-=p.vy; p.x+=p.vx; p.a-=0.0018;
        if(p.y<-10||p.a<=0){p.y=H+10;p.x=Math.random()*W;p.a=rnd(0.2,0.8);}
        ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; f++; requestAnimationFrame(loop);
    })();
  }

  // ── LANCEMENT ────────────────────────────────────────────────────────────────
  const ANIMS = {
    spiderman:   animSpiderman,
    mario:       animMario,
    batman:      animBatman,
    starwars:    animStarwars,
    harrypotter: animHarryPotter,
    marvel:      animMarvel,
    pixar:       () => animParticles('#000820',['#00ccff','#ff66cc','#ffe600','#00ff99'],'rgba(0,200,255,0.08)'),
    jurassic:    () => animParticles('#010805',['#33aa00','#88cc00','#006600','#ccff44'],'rgba(0,160,0,0.09)'),
    default:     animDefault,
  };
  (ANIMS[theme] || ANIMS.default)();

  // Redirect vers la collection après l'animation (Spider-Man plus long à cause de la descente)
  setTimeout(() => { window.location.href = '/'; }, theme === 'spiderman' ? 5400 : 4800);
  </script>
