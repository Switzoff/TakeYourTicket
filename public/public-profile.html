<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket — Profil</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/auth-init.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 80px; }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px 8px;
    }
    .back-btn {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 50%;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .topbar h1 { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }

    .header { padding: 24px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: #222; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .display-name { font-size: 20px; font-weight: 600; }

    .friend-action { padding: 0 20px 20px; }
    .friend-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .friend-btn.add { background: #fff; color: #000; }
    .friend-btn.remove { background: #2a2a2a; color: #fff; border: 0.5px solid #444; }
    .friend-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .section { padding: 0 20px 16px; }
    .section-title { color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 20px;
      padding: 7px 14px; font-size: 12px; color: #ddd;
    }

    .fav-row { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 8px; scrollbar-width: none; }
    .fav-row::-webkit-scrollbar { display: none; }
    .fav-film { flex-shrink: 0; width: 92px; }
    .fav-film .poster {
      width: 92px; height: 138px; border-radius: 8px; overflow: hidden;
      background: #1a1a1a; border: 0.5px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .fav-film .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .fav-film .label {
      font-size: 11px; color: #ccc; margin-top: 6px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .quote-card-item {
      flex-shrink: 0; width: 220px;
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .quote-card-item .text {
      color: #ddd; font-size: 12px; line-height: 1.45; font-style: italic;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 70px;
    }
    .quote-card-item .film-line {
      display: flex; align-items: center; gap: 8px;
      padding-top: 10px; border-top: 0.5px solid #2a2a2a;
    }
    .quote-card-item .film-line img {
      width: 26px; height: 38px; border-radius: 3px; object-fit: cover; flex-shrink: 0;
    }
    .quote-card-item .film-line .placeholder {
      width: 26px; height: 38px; border-radius: 3px; background: #222;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .quote-card-item .film-line .name {
      font-size: 11px; color: #888; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .empty-section { color: #555; font-size: 12px; padding: 8px 0; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 0.5px solid #1e1e1e;
      display: flex; padding: 12px 0 24px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: #555; font-size: 10px;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </div>
    <h1>Profil</h1>
  </div>

  <div class="header">
    <div class="avatar" id="avatar">👤</div>
    <div class="display-name" id="display-name">…</div>
  </div>

  <div class="friend-action" id="friend-action" style="display:none">
    <button class="friend-btn" id="friend-btn">Ajouter en ami</button>
  </div>

  <div class="section">
    <div class="section-title">Films préférés</div>
    <div class="fav-row" id="films-row"></div>
  </div>

  <div class="section">
    <div class="section-title">Répliques préférées</div>
    <div class="fav-row" id="quotes-row"></div>
  </div>

  <div class="section">
    <div class="section-title">Acteurs / actrices préférés</div>
    <div class="chips" id="actors-chips"></div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Collection
    </a>
    <a href="/scanner" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M3 9V6a1 1 0 0 1 1-1h3M15 5h3a1 1 0 0 1 1 1v3M21 15v3a1 1 0 0 1-1 1h-3M9 19H6a1 1 0 0 1-1-1v-3"/>
      </svg>
      Scanner
    </a>
    <a href="/profil" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profil
    </a>
  </nav>

  <script>
    const profileUid = window.location.pathname.split('/u/')[1];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function render(profile) {
      document.getElementById('display-name').textContent = profile.displayName || 'Sans nom';
      const avatar = document.getElementById('avatar');
      if (profile.photoURL) {
        avatar.innerHTML = `<img src="${escapeHtml(profile.photoURL)}" alt="">`;
      }

      const films = (profile.favoriteFilms || []).map(f => (typeof f === 'string') ? { title: f } : f);
      const filmsRow = document.getElementById('films-row');
      if (!films.length) {
        filmsRow.innerHTML = '<div class="empty-section">Aucun film préféré</div>';
      } else {
        filmsRow.innerHTML = films.map(f => {
          const poster = f.poster
            ? `<img src="${escapeHtml(f.poster)}" alt="" loading="lazy">`
            : `🎬`;
          return `<div class="fav-film">
            <div class="poster">${poster}</div>
            <div class="label">${escapeHtml(f.title || '')}</div>
          </div>`;
        }).join('');
      }

      const quotesRow = document.getElementById('quotes-row');
      const quotes = profile.favoriteQuotes || [];
      if (!quotes.length) {
        quotesRow.innerHTML = '<div class="empty-section">Aucune réplique</div>';
      } else {
        quotesRow.innerHTML = quotes.map(q => {
          const film = q.film || {};
          const poster = film.poster
            ? `<img src="${escapeHtml(film.poster)}" alt="" loading="lazy">`
            : `<div class="placeholder">🎬</div>`;
          return `<div class="quote-card-item">
            <div class="text">« ${escapeHtml(q.text || '')} »</div>
            <div class="film-line">${poster}<div class="name">${escapeHtml(film.title || '')}</div></div>
          </div>`;
        }).join('');
      }

      const actorsChips = document.getElementById('actors-chips');
      const actors = profile.favoriteActors || [];
      if (!actors.length) {
        actorsChips.innerHTML = '<div class="empty-section">Aucun acteur</div>';
      } else {
        actorsChips.innerHTML = actors.map(a =>
          `<span class="chip">${escapeHtml(a)}</span>`
        ).join('');
      }
    }

    async function setFriendButton(isFriend) {
      const wrap = document.getElementById('friend-action');
      const btn = document.getElementById('friend-btn');
      wrap.style.display = 'block';
      btn.disabled = false;
      if (isFriend) {
        btn.textContent = 'Retirer des amis';
        btn.className = 'friend-btn remove';
        btn.onclick = async () => {
          btn.disabled = true;
          await apiFetch(`/api/amis?friendUid=${encodeURIComponent(profileUid)}`, { method: 'DELETE' });
          setFriendButton(false);
        };
      } else {
        btn.textContent = 'Ajouter en ami';
        btn.className = 'friend-btn add';
        btn.onclick = async () => {
          btn.disabled = true;
          await apiFetch('/api/amis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ friendUid: profileUid }),
          });
          setFriendButton(true);
        };
      }
    }

    window.authReady.then(async (currentUser) => {
      const r = await fetch(`/api/profile-public?uid=${encodeURIComponent(profileUid)}`);
      const profile = await r.json();
      render(profile);

      if (currentUser.uid === profileUid) return; // pas de bouton sur son propre profil
      const friendsRes = await apiFetch('/api/amis');
      const friends = await friendsRes.json();
      const isFriend = friends.some(f => f.uid === profileUid);
      setFriendButton(isFriend);
    });
  </script>
</body>
</html>
