<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakeYourTicket — Profil</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/auth-init.js"></script>
  <script src="/badge-render.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 80px; }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px 8px;
    }
    .back-btn {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 50%;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .topbar h1 { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }

    .header { padding: 24px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: #222; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .display-name { font-size: 20px; font-weight: 600; }

    .friend-action { padding: 0 20px 20px; }
    .friend-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .friend-btn.add { background: #fff; color: #000; }
    .friend-btn.remove { background: #2a2a2a; color: #fff; border: 0.5px solid #444; }
    .friend-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .block-btn {
      width: 100%; padding: 12px; margin-top: 8px;
      background: transparent; color: #999; border: 0.5px solid #333; border-radius: 12px;
      font-size: 13px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .block-btn:hover { color: #e55; border-color: #e55; }
    .private-banner {
      margin: 0 20px 16px; padding: 16px;
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px;
      text-align: center; color: #888; font-size: 13px;
    }

    .section { padding: 0 20px 16px; }
    .section-title { color: #555; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 20px;
      padding: 7px 14px; font-size: 12px; color: #ddd;
    }

    .fav-row { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 8px; scrollbar-width: none; }
    .fav-row::-webkit-scrollbar { display: none; }
    .fav-film { flex-shrink: 0; width: 92px; }
    .fav-film .poster {
      width: 92px; height: 138px; border-radius: 8px; overflow: hidden;
      background: #1a1a1a; border: 0.5px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .fav-film .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .fav-film .label {
      font-size: 11px; color: #ccc; margin-top: 6px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .quote-card-item {
      flex-shrink: 0; width: 220px;
      background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .quote-card-item .text {
      color: #ddd; font-size: 12px; line-height: 1.45; font-style: italic;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 70px;
    }
    .quote-card-item .film-line {
      display: flex; align-items: center; gap: 8px;
      padding-top: 10px; border-top: 0.5px solid #2a2a2a;
    }
    .quote-card-item .film-line img {
      width: 26px; height: 38px; border-radius: 3px; object-fit: cover; flex-shrink: 0;
    }
    .quote-card-item .film-line .placeholder {
      width: 26px; height: 38px; border-radius: 3px; background: #222;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .quote-card-item .film-line .name {
      font-size: 11px; color: #888; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .empty-section { color: #555; font-size: 12px; padding: 8px 0; }

    .badges-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .badge-tile { aspect-ratio: 1; padding: 4px; background: transparent; border: none; cursor: pointer; transition: transform 0.15s; }
    .badge-tile:hover, .badge-tile:active { transform: scale(1.06); }
    .badge-tile svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
    .badges-empty { grid-column: 1 / -1; color: #555; font-size: 12px; padding: 12px 0; text-align: center; }

    .badge-detail-modal { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; padding: 24px; opacity: 0; transition: opacity 0.25s; }
    .badge-detail-modal.active { display: flex; opacity: 1; }
    .badge-detail-card { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 18px; padding: 28px 24px; max-width: 360px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; transform: scale(0.92); transition: transform 0.25s; }
    .badge-detail-modal.active .badge-detail-card { transform: scale(1); }
    .badge-detail-disc { width: 180px; height: 180px; }
    .badge-detail-disc svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)); }
    .badge-detail-name { font-size: 18px; font-weight: 700; text-align: center; margin-top: 8px; }
    .badge-detail-desc { font-size: 13px; color: #aaa; text-align: center; line-height: 1.5; }
    .badge-detail-meta { width: 100%; margin-top: 8px; padding-top: 14px; border-top: 0.5px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: #888; }
    .badge-detail-meta b { color: #ddd; font-weight: 500; }
    .badge-detail-close { margin-top: 14px; width: 100%; background: #2a2a2a; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; border-top: 0.5px solid #1e1e1e;
      display: flex; padding: 12px 0 24px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: #555; font-size: 10px;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </div>
    <h1>Profil</h1>
  </div>

  <div class="header">
    <div class="avatar" id="avatar">👤</div>
    <div class="display-name" id="display-name">…</div>
  </div>

  <div class="friend-action" id="friend-action" style="display:none">
    <button class="friend-btn" id="friend-btn">Ajouter en ami</button>
    <button class="block-btn" id="block-btn" onclick="askBlock()">Bloquer</button>
  </div>

  <div class="private-banner" id="private-banner" style="display:none">
    Ce profil est privé.
  </div>

  <div class="section">
    <div class="section-title">Badges</div>
    <div class="badges-grid" id="badges-grid"></div>
  </div>

  <div class="section">
    <div class="section-title">Films préférés</div>
    <div class="fav-row" id="films-row"></div>
  </div>

  <div class="section">
    <div class="section-title">Répliques préférées</div>
    <div class="fav-row" id="quotes-row"></div>
  </div>

  <div class="section">
    <div class="section-title">Acteurs / actrices préférés</div>
    <div class="chips" id="actors-chips"></div>
  </div>

  <!-- Modal détail badge -->
  <div class="badge-detail-modal" id="badge-detail-modal" onclick="closeBadgeDetail(event)">
    <div class="badge-detail-card" onclick="event.stopPropagation()">
      <div class="badge-detail-disc" id="bd-disc"></div>
      <div class="badge-detail-name" id="bd-name">—</div>
      <div class="badge-detail-desc" id="bd-desc"></div>
      <div class="badge-detail-meta">
        <div>Débloqué le <b id="bd-date">—</b></div>
        <div>Avec : <b id="bd-film">—</b></div>
      </div>
      <button class="badge-detail-close" onclick="closeBadgeDetail()">Fermer</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Collection
    </a>
    <a href="/scanner" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M3 9V6a1 1 0 0 1 1-1h3M15 5h3a1 1 0 0 1 1 1v3M21 15v3a1 1 0 0 1-1 1h-3M9 19H6a1 1 0 0 1-1-1v-3"/>
      </svg>
      Scanner
    </a>
    <a href="/profil" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profil
    </a>
  </nav>

  <script>
    const profileUid = window.location.pathname.split('/u/')[1];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    let currentProfileBadges = [];

    function render(profile) {
      document.getElementById('display-name').textContent = profile.displayName || 'Sans nom';
      const avatar = document.getElementById('avatar');
      if (profile.photoURL) {
        avatar.innerHTML = `<img src="${escapeHtml(profile.photoURL)}" alt="">`;
      }

      currentProfileBadges = profile.badges || [];
      const badgesGrid = document.getElementById('badges-grid');
      if (!currentProfileBadges.length) {
        badgesGrid.innerHTML = '<div class="badges-empty">Aucun badge</div>';
      } else {
        badgesGrid.innerHTML = currentProfileBadges.map((b, i) => `
          <button class="badge-tile" onclick="openBadgeDetail(${i})" aria-label="${escapeHtml(b.name)}">
            ${window.renderBadge(b, { size: 110 })}
          </button>
        `).join('');
      }

      const films = (profile.favoriteFilms || []).map(f => (typeof f === 'string') ? { title: f } : f);
      const filmsRow = document.getElementById('films-row');
      if (!films.length) {
        filmsRow.innerHTML = '<div class="empty-section">Aucun film préféré</div>';
      } else {
        filmsRow.innerHTML = films.map(f => {
          const poster = f.poster
            ? `<img src="${escapeHtml(f.poster)}" alt="" loading="lazy">`
            : `🎬`;
          return `<div class="fav-film">
            <div class="poster">${poster}</div>
            <div class="label">${escapeHtml(f.title || '')}</div>
          </div>`;
        }).join('');
      }

      const quotesRow = document.getElementById('quotes-row');
      const quotes = profile.favoriteQuotes || [];
      if (!quotes.length) {
        quotesRow.innerHTML = '<div class="empty-section">Aucune réplique</div>';
      } else {
        quotesRow.innerHTML = quotes.map(q => {
          const film = q.film || {};
          const poster = film.poster
            ? `<img src="${escapeHtml(film.poster)}" alt="" loading="lazy">`
            : `<div class="placeholder">🎬</div>`;
          return `<div class="quote-card-item">
            <div class="text">« ${escapeHtml(q.text || '')} »</div>
            <div class="film-line">${poster}<div class="name">${escapeHtml(film.title || '')}</div></div>
          </div>`;
        }).join('');
      }

      const actorsChips = document.getElementById('actors-chips');
      const actors = profile.favoriteActors || [];
      if (!actors.length) {
        actorsChips.innerHTML = '<div class="empty-section">Aucun acteur</div>';
      } else {
        actorsChips.innerHTML = actors.map(a =>
          `<span class="chip">${escapeHtml(a)}</span>`
        ).join('');
      }
    }

    function openBadgeDetail(i) {
      const b = currentProfileBadges[i];
      if (!b) return;
      document.getElementById('bd-disc').innerHTML = window.renderBadge(b, { size: 180 });
      document.getElementById('bd-name').textContent = b.name || '';
      document.getElementById('bd-desc').textContent = b.description || '';
      document.getElementById('bd-film').textContent = b.filmTitle || '—';
      const date = b.unlockedAt ? new Date(b.unlockedAt) : null;
      document.getElementById('bd-date').textContent = date && !isNaN(date)
        ? date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
        : '—';
      document.getElementById('badge-detail-modal').classList.add('active');
    }
    function closeBadgeDetail(e) {
      if (e && e.target.closest('.badge-detail-card')) return;
      document.getElementById('badge-detail-modal').classList.remove('active');
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('badge-detail-modal').classList.contains('active')) {
        closeBadgeDetail();
      }
    });

    async function setFriendButton(isFriend) {
      const wrap = document.getElementById('friend-action');
      const btn = document.getElementById('friend-btn');
      wrap.style.display = 'block';
      btn.disabled = false;
      if (isFriend) {
        btn.textContent = 'Retirer des amis';
        btn.className = 'friend-btn remove';
        btn.onclick = async () => {
          btn.disabled = true;
          await apiFetch(`/api/amis?friendUid=${encodeURIComponent(profileUid)}`, { method: 'DELETE' });
          setFriendButton(false);
        };
      } else {
        btn.textContent = 'Ajouter en ami';
        btn.className = 'friend-btn add';
        btn.onclick = async () => {
          btn.disabled = true;
          await apiFetch('/api/amis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ friendUid: profileUid }),
          });
          setFriendButton(true);
        };
      }
    }

    async function askBlock() {
      if (!confirm('Bloquer cet utilisateur ?\nIl sera retiré de tes amis et vous ne vous verrez plus dans les recherches.')) return;
      const btn = document.getElementById('block-btn');
      btn.disabled = true; btn.textContent = 'Blocage…';
      try {
        await apiFetch('/api/blocks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid: profileUid }),
        });
        location.href = '/profil';
      } catch {
        btn.disabled = false; btn.textContent = 'Bloquer';
        alert('Erreur lors du blocage');
      }
    }

    window.authReady.then(async (currentUser) => {
      // Récupère le profil avec un token authentifié pour respecter la confidentialité
      const r = await apiFetch(`/api/profile-public?uid=${encodeURIComponent(profileUid)}`);
      const profile = await r.json();

      // Profil privé : on n'affiche que l'avatar et le nom
      if (profile.private) {
        document.getElementById('display-name').textContent = profile.displayName || 'Sans nom';
        if (profile.photoURL) {
          document.getElementById('avatar').innerHTML = `<img src="${escapeHtml(profile.photoURL)}" alt="">`;
        }
        document.getElementById('private-banner').style.display = 'block';
        if (currentUser.uid !== profileUid) {
          document.getElementById('friend-action').style.display = 'block';
          document.getElementById('friend-btn').style.display = 'none';
        }
        return;
      }

      render(profile);

      if (currentUser.uid === profileUid) return; // pas de bouton sur son propre profil
      const friendsRes = await apiFetch('/api/amis');
      const friends = await friendsRes.json();
      const isFriend = friends.some(f => f.uid === profileUid);
      setFriendButton(isFriend);

      // Cache le bouton "Ajouter en ami" si la cible n'accepte pas les demandes
      if (!isFriend && profile.friendRequests === 'nobody') {
        document.getElementById('friend-btn').style.display = 'none';
      }
    });
  </script>
</body>
</html>
