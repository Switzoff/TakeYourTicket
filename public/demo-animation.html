<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Scan — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050408; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .flash {
      position: fixed; inset: 0; background: white; z-index: 100;
      animation: flash 0.4s ease-out both;
      pointer-events: none;
    }
    @keyframes flash { 0% { opacity: 0.55; } 100% { opacity: 0; } }

    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* La carte descend depuis le haut, tirée par la toile */
    .ticket-wrap {
      width: 160px; height: 220px;
      border-radius: 14px; overflow: hidden;
      position: relative;
      animation: webPull 0.7s cubic-bezier(0.22, 1.3, 0.35, 1) both, dangle 3.5s ease-in-out infinite;
      animation-delay: 0.35s, 1.2s;
      box-shadow: 0 0 40px rgba(180, 0, 0, 0.4), 0 0 80px rgba(0, 50, 180, 0.25), 0 8px 32px rgba(0,0,0,0.75);
      transform-origin: top center;
    }
    @keyframes webPull {
      0%   { transform: scale(0.02) translateY(-55vh) rotate(-3deg); opacity: 0; filter: blur(3px); }
      30%  { transform: scale(0.2)  translateY(-20vh) rotate(2deg);  opacity: 1; filter: blur(2px); }
      65%  { transform: scale(1.1)  translateY(0)     rotate(-1deg); opacity: 1; filter: blur(0); }
      85%  { transform: scale(0.97) translateY(0)     rotate(0.5deg);opacity: 1; filter: blur(0); }
      100% { transform: scale(1)    translateY(0)     rotate(0deg);  opacity: 1; filter: blur(0); }
    }
    @keyframes dangle {
      0%,100% { transform: rotate(-1deg); }
      50%     { transform: rotate(1deg); }
    }

    .ticket-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .ticket-placeholder {
      width: 100%; height: 100%; background: #111;
      display: flex; align-items: center; justify-content: center; font-size: 52px;
    }

    .ticket-sheen {
      position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: sheen 3s ease-in-out infinite; animation-delay: 1.4s;
      pointer-events: none;
    }
    @keyframes sheen {
      0%   { background-position: -100% -100%; }
      50%  { background-position:  120%  120%; }
      100% { background-position: -100% -100%; }
    }

    .title-group {
      text-align: center;
      animation: fadeUp 0.6s ease both; animation-delay: 1s;
    }
    .title-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .film-title  { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .holo-tag {
      display: inline-block; margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      padding: 3px 12px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
      animation: pulse 2s ease-in-out infinite; animation-delay: 1.6s;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .added-msg {
      font-size: 13px; color: #4caf50; letter-spacing: 1px;
      animation: fadeUp 0.5s ease both; animation-delay: 1.3s;
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .btn {
      margin-top: 4px; padding: 13px 30px; border-radius: 40px;
      background: #fff; color: #000; border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      animation: fadeUp 0.5s ease both; animation-delay: 1.6s;
    }

    .replay {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; border: none; background: transparent;
    }
    .replay:hover { color: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flash"></div>

  <div class="scene">
    <div class="ticket-wrap">
      <img id="poster" src="" alt="Spider-Man Brand New Day" style="display:none">
      <div class="ticket-placeholder" id="placeholder">🎬</div>
      <div class="ticket-sheen"></div>
    </div>

    <div class="title-group">
      <div class="title-label">Ticket collector</div>
      <div class="film-title">Spider-Man Brand New Day</div>
      <div class="holo-tag">✦ Holo</div>
    </div>

    <div class="added-msg">✓ Ajouté à ta collection</div>
    <button class="btn" onclick="window.location='/'">Voir ma collection</button>
  </div>

  <button class="replay" onclick="location.reload()">↺ Revoir l'animation</button>

  <script>
    // ── CANVAS ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2;

    // Position de la carte (centre verticalement, -110px pour viser le haut de la carte)
    const CARD_TOP_Y = CY - 110;

    // ── PHASES ──────────────────────────────────────────────────────────────
    const SHOT_END   = 16;   // ~265 ms — la toile atteint la carte
    const SPLAY_END  = 24;   // pointe qui s'évase en doigts
    const IMPACT_END = 28;
    const SPOKES_START = 22;
    const RINGS_START  = SPOKES_START + 22*2 + 8;

    // ── BOKEH CHAUD (lumières floues) ───────────────────────────────────────
    const bokehs = [
      { x: W*0.18, y: H*0.14, r: W*0.12, c: 'rgba(255, 120, 40, 0.28)' },
      { x: W*0.82, y: H*0.30, r: W*0.14, c: 'rgba(255, 90, 30, 0.22)' },
      { x: W*0.08, y: H*0.75, r: W*0.10, c: 'rgba(200, 80, 40, 0.18)' },
      { x: W*0.90, y: H*0.85, r: W*0.10, c: 'rgba(255, 110, 50, 0.16)' },
    ];
    function drawBokeh() {
      for (const b of bokehs) {
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0, b.c); g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      }
    }

    // Poussière/fibres qui flottent
    const dust = Array.from({length:45}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.2 + 0.3,
      vy: Math.random()*0.2 + 0.05,
      vx: (Math.random()-0.5)*0.15,
      a: Math.random()*0.4 + 0.1,
    }));

    // ── PERLES SUR LA TOILE ─────────────────────────────────────────────────
    // Pré-calculées pour ne pas scintiller
    const beads = Array.from({length:14}, () => ({
      t: Math.random(),                    // position 0→1 le long de la toile
      off: (Math.random()-0.5) * 4,        // léger décalage perpendiculaire
      r: Math.random()*1.5 + 0.8,
    }));

    // ── TIR DE TOILE (vertical, depuis le haut) ──────────────────────────────
    function drawWebStrand(f) {
      // Progression du tir
      const shotP = Math.min(1, f / SHOT_END);
      const easeP = 1 - Math.pow(1 - shotP, 2.5);
      const tipY = -30 + (CARD_TOP_Y - -30) * easeP;

      // Opacité de la corde principale (diminue après l'impact mais reste visible)
      const alpha = f < SHOT_END ? 1 : Math.max(0.45, 1 - (f - SHOT_END) * 0.015);

      // Halo bleuté flou derrière (donne l'impression de lumière)
      const glow = ctx.createLinearGradient(CX-6, -30, CX+6, tipY);
      glow.addColorStop(0, `rgba(180, 220, 255, ${0.25*alpha})`);
      glow.addColorStop(1, `rgba(180, 220, 255, ${0.15*alpha})`);
      ctx.strokeStyle = glow;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(CX, -30);
      ctx.lineTo(CX, tipY);
      ctx.stroke();

      // Corde principale blanche épaisse
      ctx.strokeStyle = `rgba(245, 250, 255, ${alpha})`;
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.moveTo(CX, -30);
      ctx.lineTo(CX, tipY);
      ctx.stroke();

      // Coeur brillant très fin
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(CX, -30);
      ctx.lineTo(CX, tipY);
      ctx.stroke();

      // Texture irrégulière : petits traits perpendiculaires
      ctx.strokeStyle = `rgba(220, 235, 255, ${0.4*alpha})`;
      ctx.lineWidth = 0.6;
      const segLen = tipY - (-30);
      for (let i = 0; i < 30; i++) {
        const y = -30 + segLen * (i / 30);
        const w = (Math.sin(i * 1.7 + f*0.08) * 3) + 1;
        ctx.beginPath();
        ctx.moveTo(CX - w, y);
        ctx.lineTo(CX + w, y);
        ctx.stroke();
      }

      // Perles le long de la corde
      for (const b of beads) {
        const t = Math.min(b.t, (tipY + 30) / (CARD_TOP_Y + 30));
        if (t > (tipY + 30) / (CARD_TOP_Y + 30)) continue;
        const y = -30 + (tipY - -30) * b.t;
        if (y > tipY) continue;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(CX + b.off, y, b.r, 0, Math.PI*2);
        ctx.fill();
        // Halo
        ctx.fillStyle = `rgba(180, 220, 255, ${0.3*alpha})`;
        ctx.beginPath();
        ctx.arc(CX + b.off, y, b.r * 2.2, 0, Math.PI*2);
        ctx.fill();
      }

      // Pointe brillante pendant le tir
      if (shotP < 1) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
        ctx.beginPath(); ctx.arc(CX, tipY, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(200, 230, 255, 0.5)';
        ctx.beginPath(); ctx.arc(CX, tipY, 11, 0, Math.PI*2); ctx.fill();
      }
    }

    // ── POINTE QUI S'ÉVASE EN DOIGTS (comme sur l'image) ─────────────────────
    function drawSplay(f) {
      if (f < SHOT_END - 2) return;
      const p = Math.min(1, (f - (SHOT_END - 2)) / (SPLAY_END - SHOT_END + 2));
      const ease = 1 - Math.pow(1 - p, 2);

      const FINGERS = 7;
      const spread  = Math.PI * 0.85;   // ~155° vers le bas
      const maxLen  = 55 * ease;

      // Pré-calculés déterministes
      const fingers = [
        { lenFactor: 0.95, curve:  3 },
        { lenFactor: 0.80, curve: -4 },
        { lenFactor: 1.00, curve:  2 },
        { lenFactor: 0.70, curve:  5 },
        { lenFactor: 0.88, curve: -3 },
        { lenFactor: 0.75, curve:  4 },
        { lenFactor: 0.92, curve: -2 },
      ];

      ctx.strokeStyle = 'rgba(240, 248, 255, 0.85)';
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';

      const tipX = CX, tipY = CARD_TOP_Y;

      for (let i = 0; i < FINGERS; i++) {
        const t = i / (FINGERS - 1);
        const angle = Math.PI/2 + (t - 0.5) * spread; // ~vers le bas
        const L = maxLen * fingers[i].lenFactor;
        const ex = tipX + Math.cos(angle) * L;
        const ey = tipY + Math.sin(angle) * L;
        const mx = tipX + Math.cos(angle) * L * 0.55 + fingers[i].curve;
        const my = tipY + Math.sin(angle) * L * 0.55;

        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.quadraticCurveTo(mx, my, ex, ey);
        ctx.stroke();
      }

      // Fibres transversales qui relient les doigts (effet "filet")
      if (p > 0.5) {
        ctx.strokeStyle = `rgba(220, 235, 255, ${(p - 0.5) * 2 * 0.5})`;
        ctx.lineWidth = 0.5;
        for (let ring = 0; ring < 3; ring++) {
          const r = maxLen * (0.4 + ring * 0.2);
          ctx.beginPath();
          for (let i = 0; i < FINGERS; i++) {
            const t = i / (FINGERS - 1);
            const angle = Math.PI/2 + (t - 0.5) * spread;
            const x = tipX + Math.cos(angle) * r;
            const y = tipY + Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }
    }

    // ── IMPACT (flash lumineux) ─────────────────────────────────────────────
    function drawImpact(f) {
      if (f < SHOT_END || f > IMPACT_END) return;
      const p = (f - SHOT_END) / (IMPACT_END - SHOT_END);
      const r = 20 + p * 60;
      const alpha = (1 - p) * 0.6;
      const g = ctx.createRadialGradient(CX, CARD_TOP_Y, 0, CX, CARD_TOP_Y, r);
      g.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
      g.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // ── TOILE RADIALE AUTOUR DE LA CARTE ─────────────────────────────────────
    const SPOKES = 22;
    const RINGS  = [55, 108, 168, 234, 307, 387, 475, 572];
    const angles = Array.from({length:SPOKES}, (_,i) => (i/SPOKES)*Math.PI*2 - Math.PI/2);
    const spokeP = new Float32Array(SPOKES);
    const ringP  = new Float32Array(RINGS.length);

    function edgeDist(a) {
      const ca = Math.abs(Math.cos(a)), sa = Math.abs(Math.sin(a));
      const fw = ca < 0.001 ? Infinity : (Math.cos(a) > 0 ? W-CX : CX) / ca;
      const fh = sa < 0.001 ? Infinity : (Math.sin(a) > 0 ? H-CY : CY) / sa;
      return Math.min(fw, fh) * 1.08;
    }

    function drawRadialWeb(f) {
      for (let i = 0; i < SPOKES; i++) {
        const sf = SPOKES_START + i * 2;
        if (f >= sf) spokeP[i] = Math.min(1, (f - sf) / 24);
      }
      for (let i = 0; i < RINGS.length; i++) {
        const sf = RINGS_START + i * 11;
        if (f >= sf) ringP[i] = Math.min(1, (f - sf) / 30);
      }

      ctx.lineWidth = 0.7;
      for (let i = 0; i < SPOKES; i++) {
        if (spokeP[i] <= 0) continue;
        const len = edgeDist(angles[i]) * spokeP[i];
        ctx.strokeStyle = `rgba(200, 210, 255, ${0.38 * spokeP[i]})`;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + Math.cos(angles[i])*len, CY + Math.sin(angles[i])*len);
        ctx.stroke();
      }

      ctx.lineWidth = 0.55;
      for (let ri = 0; ri < RINGS.length; ri++) {
        if (ringP[ri] <= 0) continue;
        const r = RINGS[ri], alpha = Math.min(0.4, ringP[ri] * 0.8);
        ctx.strokeStyle = `rgba(200, 215, 255, ${alpha})`;
        const segs = Math.floor(SPOKES * ringP[ri]);
        ctx.beginPath();
        for (let i = 0; i <= segs; i++) {
          const ai = i % SPOKES;
          if (r > edgeDist(angles[ai])) continue;
          const px = CX + Math.cos(angles[ai])*r;
          const py = CY + Math.sin(angles[ai])*r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        if (ringP[ri] >= 1 && r <= edgeDist(angles[0])) {
          ctx.lineTo(CX + Math.cos(angles[0])*r, CY + Math.sin(angles[0])*r);
        }
        ctx.stroke();
      }
    }

    let frame = 0;
    function loop() {
      ctx.clearRect(0, 0, W, H);

      // Fond noir profond
      ctx.fillStyle = '#050408';
      ctx.fillRect(0, 0, W, H);

      // Lumières chaudes en arrière-plan (cinéma)
      drawBokeh();

      // Poussière qui flotte
      for (const d of dust) {
        d.y += d.vy; d.x += d.vx;
        if (d.y > H) d.y = 0;
        if (d.x > W) d.x = 0; if (d.x < 0) d.x = W;
        ctx.globalAlpha = d.a;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Toile verticale qui descend
      drawWebStrand(frame);
      drawSplay(frame);
      drawImpact(frame);

      // Toile qui rayonne autour de la carte
      drawRadialWeb(frame);

      frame++;
      requestAnimationFrame(loop);
    }
    loop();

    // ── CHARGER L'AFFICHE ────────────────────────────────────────────────────
    fetch('/api/affiche/Spider-Man%20Brand%20New%20Day')
      .then(r => r.json())
      .then(d => {
        if (d.affiche) {
          const img = document.getElementById('poster');
          img.onload = () => {
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
          };
          img.src = d.affiche;
        }
      }).catch(() => {});
  </script>
</body>
</html>
