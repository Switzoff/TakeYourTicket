<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Scan — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060005; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .flash {
      position: fixed; inset: 0; background: white; z-index: 100;
      animation: flash 0.45s ease-out both;
      pointer-events: none;
    }
    @keyframes flash { 0% { opacity: 0.75; } 100% { opacity: 0; } }

    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    /* La carte : "tirée" par la toile depuis le fond de l'écran */
    .ticket-wrap {
      width: 160px; height: 220px;
      border-radius: 14px; overflow: hidden;
      position: relative;
      animation: webPull 0.55s cubic-bezier(0.18, 1.6, 0.3, 1) both;
      animation-delay: 0.28s;
      box-shadow: 0 0 40px rgba(180, 0, 0, 0.4), 0 0 80px rgba(0, 50, 180, 0.25), 0 8px 32px rgba(0,0,0,0.7);
      transform-origin: center center;
    }
    @keyframes webPull {
      0%   { transform: scale(0.02) translate(-35vw, -20vh) rotate(-18deg); opacity: 0; filter: blur(3px); }
      25%  { transform: scale(0.12) translate(-18vw, -10vh) rotate(-10deg); opacity: 1; filter: blur(2px); }
      60%  { transform: scale(1.08) translate(0, 0)        rotate(4deg);   opacity: 1; filter: blur(0); }
      82%  { transform: scale(0.96) translate(0, 0)        rotate(-1.5deg); opacity: 1; filter: blur(0); }
      100% { transform: scale(1)    translate(0, 0)        rotate(0deg);   opacity: 1; filter: blur(0); }
    }
    .ticket-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .ticket-placeholder {
      width: 100%; height: 100%; background: #111;
      display: flex; align-items: center; justify-content: center; font-size: 52px;
    }

    .ticket-sheen {
      position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: sheen 3s ease-in-out infinite; animation-delay: 1.2s;
      pointer-events: none;
    }
    @keyframes sheen {
      0%   { background-position: -100% -100%; }
      50%  { background-position:  120%  120%; }
      100% { background-position: -100% -100%; }
    }

    .title-group {
      text-align: center;
      animation: fadeUp 0.6s ease both; animation-delay: 0.9s;
    }
    .title-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .film-title  { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .holo-tag {
      display: inline-block; margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      padding: 3px 12px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
      animation: pulse 2s ease-in-out infinite; animation-delay: 1.5s;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .added-msg {
      font-size: 13px; color: #4caf50; letter-spacing: 1px;
      animation: fadeUp 0.5s ease both; animation-delay: 1.2s;
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .btn {
      margin-top: 4px; padding: 13px 30px; border-radius: 40px;
      background: #fff; color: #000; border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      animation: fadeUp 0.5s ease both; animation-delay: 1.5s;
    }

    .replay {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; border: none; background: transparent;
    }
    .replay:hover { color: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flash"></div>

  <div class="scene">
    <div class="ticket-wrap">
      <img id="poster" src="" alt="Spider-Man Brand New Day" style="display:none">
      <div class="ticket-placeholder" id="placeholder">🎬</div>
      <div class="ticket-sheen"></div>
    </div>

    <div class="title-group">
      <div class="title-label">Ticket collector</div>
      <div class="film-title">Spider-Man Brand New Day</div>
      <div class="holo-tag">✦ Holo</div>
    </div>

    <div class="added-msg">✓ Ajouté à ta collection</div>
    <button class="btn" onclick="window.location='/'">Voir ma collection</button>
  </div>

  <button class="replay" onclick="location.reload()">↺ Revoir l'animation</button>

  <script>
    // ── CANVAS ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2;

    // ── PHASES (en frames à 60fps) ──────────────────────────────────────────
    const SHOT_FROM  = { x: -40, y: -40 };   // coin haut-gauche (hors écran)
    const SHOT_TO    = { x: CX, y: CY };
    const SHOT_END   = 14;                    // ~230ms : la toile atteint la carte
    const IMPACT_END = 22;                    // ~370ms : splash terminé
    const SPOKES_START = 18;                  // toile rayonne après l'impact
    const RINGS_START  = SPOKES_START + 22*2 + 8;

    // ── TOILE RADIALE ────────────────────────────────────────────────────────
    const SPOKES = 22;
    const RINGS  = [55, 108, 168, 234, 307, 387, 475, 572];
    const angles = Array.from({length:SPOKES}, (_,i) => (i/SPOKES)*Math.PI*2 - Math.PI/2);

    function edgeDist(a) {
      const ca = Math.abs(Math.cos(a)), sa = Math.abs(Math.sin(a));
      const fw = ca < 0.001 ? Infinity : (Math.cos(a) > 0 ? W-CX : CX) / ca;
      const fh = sa < 0.001 ? Infinity : (Math.sin(a) > 0 ? H-CY : CY) / sa;
      return Math.min(fw, fh) * 1.08;
    }

    const spokeP = new Float32Array(SPOKES);
    const ringP  = new Float32Array(RINGS.length);

    const pts = Array.from({length:85}, () => ({
      x: Math.random()*W, y: H + Math.random()*150,
      r: Math.random()*2+0.5,
      vy: Math.random()*1.4+0.8, vx: (Math.random()-0.5)*1.5,
      c: Math.random() > 0.5 ? '#dd0000' : '#4455ff',
      a: Math.random()*0.5+0.2,
    }));

    let frame = 0;

    // Dessine le TIR DE TOILE qui s'étend depuis le coin
    function drawWebShot(f) {
      if (f > SHOT_END + 30) return; // reste visible un peu après l'impact
      const p = Math.min(1, f / SHOT_END);
      const easeP = 1 - Math.pow(1 - p, 2); // ease-out rapide

      const endX = SHOT_FROM.x + (SHOT_TO.x - SHOT_FROM.x) * easeP;
      const endY = SHOT_FROM.y + (SHOT_TO.y - SHOT_FROM.y) * easeP;

      // Trait principal
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(240, 245, 255, 0.92)';
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(SHOT_FROM.x, SHOT_FROM.y);
      // Légère courbe sinusoïdale pour un effet organique
      const steps = 14;
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        const lx = SHOT_FROM.x + (endX - SHOT_FROM.x) * t;
        const ly = SHOT_FROM.y + (endY - SHOT_FROM.y) * t;
        // Perpendiculaire légèrement déplacée
        const dx = endX - SHOT_FROM.x, dy = endY - SHOT_FROM.y;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy/len, ny = dx/len;
        const wobble = Math.sin(t * Math.PI * 3 + f * 0.3) * 3 * (1 - t);
        ctx.lineTo(lx + nx * wobble, ly + ny * wobble);
      }
      ctx.stroke();

      // Petites fibres parallèles (effet toile)
      ctx.strokeStyle = 'rgba(220, 230, 255, 0.35)';
      ctx.lineWidth = 0.6;
      for (let side of [-1, 1]) {
        ctx.beginPath();
        const dx = endX - SHOT_FROM.x, dy = endY - SHOT_FROM.y;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy/len * 2.5 * side, ny = dx/len * 2.5 * side;
        ctx.moveTo(SHOT_FROM.x + nx, SHOT_FROM.y + ny);
        ctx.lineTo(endX + nx, endY + ny);
        ctx.stroke();
      }

      // Pointe brillante qui file
      if (p < 1) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
        ctx.beginPath();
        ctx.arc(endX, endY, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(endX, endY, 10, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Splash d'impact quand la toile atteint la carte
    function drawImpact(f) {
      if (f < SHOT_END || f > IMPACT_END) return;
      const p = (f - SHOT_END) / (IMPACT_END - SHOT_END);
      const r = 8 + p * 40;
      const alpha = (1 - p) * 0.9;

      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(CX + Math.cos(a) * 4, CY + Math.sin(a) * 4);
        ctx.lineTo(CX + Math.cos(a) * r, CY + Math.sin(a) * r);
        ctx.stroke();
      }

      ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(CX, CY, r * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    // Toile radiale qui se tisse autour de la carte
    function drawRadialWeb(f) {
      // Avancer les rayons (démarrent après l'impact)
      for (let i = 0; i < SPOKES; i++) {
        const startFrame = SPOKES_START + i * 2;
        if (f >= startFrame) spokeP[i] = Math.min(1, (f - startFrame) / 24);
      }
      for (let i = 0; i < RINGS.length; i++) {
        const sf = RINGS_START + i * 11;
        if (f >= sf) ringP[i] = Math.min(1, (f - sf) / 30);
      }

      // Rayons
      ctx.lineWidth = 0.7;
      for (let i = 0; i < SPOKES; i++) {
        if (spokeP[i] <= 0) continue;
        const len = edgeDist(angles[i]) * spokeP[i];
        ctx.strokeStyle = `rgba(200, 210, 255, ${0.42 * spokeP[i]})`;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + Math.cos(angles[i])*len, CY + Math.sin(angles[i])*len);
        ctx.stroke();
      }

      // Anneaux
      ctx.lineWidth = 0.55;
      for (let ri = 0; ri < RINGS.length; ri++) {
        if (ringP[ri] <= 0) continue;
        const r = RINGS[ri], alpha = Math.min(0.42, ringP[ri] * 0.85);
        ctx.strokeStyle = `rgba(200, 215, 255, ${alpha})`;
        const segs = Math.floor(SPOKES * ringP[ri]);
        ctx.beginPath();
        for (let i = 0; i <= segs; i++) {
          const ai = i % SPOKES;
          if (r > edgeDist(angles[ai])) continue;
          const px = CX + Math.cos(angles[ai])*r;
          const py = CY + Math.sin(angles[ai])*r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        if (ringP[ri] >= 1 && r <= edgeDist(angles[0])) {
          ctx.lineTo(CX + Math.cos(angles[0])*r, CY + Math.sin(angles[0])*r);
        }
        ctx.stroke();
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);

      // Lueur rouge centrale
      const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W,H)*0.55);
      g.addColorStop(0, 'rgba(180,0,0,0.13)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      drawWebShot(frame);
      drawImpact(frame);
      drawRadialWeb(frame);

      // Particules rouge/bleu
      for (const p of pts) {
        p.y -= p.vy; p.x += p.vx; p.a -= 0.0012;
        if (p.y < -10 || p.a <= 0) { p.y = H+10; p.x = Math.random()*W; p.a = Math.random()*0.5+0.2; }
        ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      frame++;
      requestAnimationFrame(loop);
    }
    loop();

    // ── CHARGER L'AFFICHE ────────────────────────────────────────────────────
    fetch('/api/affiche/Spider-Man%20Brand%20New%20Day')
      .then(r => r.json())
      .then(d => {
        if (d.affiche) {
          const img = document.getElementById('poster');
          img.onload = () => {
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
          };
          img.src = d.affiche;
        }
      }).catch(() => {});
  </script>
</body>
</html>
