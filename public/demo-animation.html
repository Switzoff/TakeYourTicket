<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Scan — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050408; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .flash {
      position: fixed; inset: 0; background: white; z-index: 100;
      animation: flash 0.35s ease-out both;
      pointer-events: none;
    }
    @keyframes flash { 0% { opacity: 0.4; } 100% { opacity: 0; } }

    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(16px, 3vh, 24px);
      padding: 0 16px;
    }

    /* La carte descend du haut, suspendue à la toile */
    .ticket-wrap {
      width: clamp(180px, 55vmin, 260px);
      aspect-ratio: 160 / 220;
      border-radius: clamp(14px, 2.5vmin, 18px); overflow: hidden;
      position: relative;
      animation: webDrop 1.6s cubic-bezier(0.42, 0.05, 0.3, 1.25) both, dangle 3.5s ease-in-out infinite;
      animation-delay: 0s, 1.7s;
      box-shadow: 0 0 40px rgba(180, 0, 0, 0.4), 0 0 80px rgba(0, 50, 180, 0.25), 0 8px 32px rgba(0,0,0,0.75);
      transform-origin: top center;
    }
    @keyframes webDrop {
      0%   { transform: translateY(-100vh) scale(0.85); opacity: 0; }
      6%   { opacity: 1; }
      72%  { transform: translateY(2vh) scale(1.04); }
      88%  { transform: translateY(-0.5vh) scale(0.98); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes dangle {
      0%,100% { transform: rotate(-1deg); }
      50%     { transform: rotate(1deg); }
    }

    .ticket-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .ticket-placeholder {
      width: 100%; height: 100%; background: #111;
      display: flex; align-items: center; justify-content: center; font-size: 52px;
    }

    .ticket-sheen {
      position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: sheen 3s ease-in-out infinite; animation-delay: 2s;
      pointer-events: none;
    }
    @keyframes sheen {
      0%   { background-position: -100% -100%; }
      50%  { background-position:  120%  120%; }
      100% { background-position: -100% -100%; }
    }

    .title-group {
      text-align: center;
      animation: fadeUp 0.6s ease both; animation-delay: 1.7s;
    }
    .title-label { font-size: clamp(10px, 1.4vmin, 12px); letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .film-title  { font-size: clamp(20px, 3vmin, 26px); font-weight: 700; letter-spacing: 0.5px; line-height: 1.2; }
    .holo-tag {
      display: inline-block; margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      padding: 4px 14px; font-size: clamp(10px, 1.3vmin, 11px); letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
      animation: pulse 2s ease-in-out infinite; animation-delay: 2.3s;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .added-msg {
      font-size: clamp(13px, 1.7vmin, 15px); color: #4caf50; letter-spacing: 1px;
      animation: fadeUp 0.5s ease both; animation-delay: 2s;
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .btn {
      margin-top: 4px; padding: 13px 30px; border-radius: 40px;
      background: #fff; color: #000; border: none; font-size: 14px; font-weight: 600; cursor: pointer;
      animation: fadeUp 0.5s ease both; animation-delay: 2.2s;
    }

    .replay {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; border: none; background: transparent;
    }
    .replay:hover { color: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="flash"></div>

  <div class="scene">
    <div class="ticket-wrap" id="card">
      <img id="poster" src="" alt="Spider-Man Brand New Day" style="display:none">
      <div class="ticket-placeholder" id="placeholder">🎬</div>
      <div class="ticket-sheen"></div>
    </div>

    <div class="title-group">
      <div class="title-label">Ticket collector</div>
      <div class="film-title">Spider-Man : Brand New Day</div>
      <div class="holo-tag">✦ Holo</div>
    </div>

    <div class="added-msg">✓ Ajouté à ta collection</div>
    <button class="btn" onclick="window.location='/'">Voir ma collection</button>
  </div>

  <button class="replay" onclick="location.reload()">↺ Revoir l'animation</button>

  <script>
    // ── CANVAS ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, CX, CY;
    function resizeCanvas() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      CX = W/2; CY = H/2;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);

    const cardEl = document.getElementById('card');

    // ── POUSSIÈRE / FIBRES QUI FLOTTENT ─────────────────────────────────────
    const dust = Array.from({length:40}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.2 + 0.3,
      vy: Math.random()*0.2 + 0.05,
      vx: (Math.random()-0.5)*0.15,
      a: Math.random()*0.4 + 0.1,
    }));

    // Perles pré-calculées (positions stables le long de la toile)
    const beads = Array.from({length:12}, () => ({
      t: Math.random(),             // position relative 0→1
      off: (Math.random()-0.5) * 4,
      r: Math.random()*1.4 + 0.7,
    }));

    // ── TIMING ──────────────────────────────────────────────────────────────
    const SPOKES_START = 100;  // ~1670ms, après que la carte soit posée
    const RINGS_START  = SPOKES_START + 22*2 + 8;
    const VMIN = Math.min(W, H);

    // ── TOILE QUI RELIE LE HAUT À LA CARTE ──────────────────────────────────
    function drawWebStrand(tipX, tipY, f) {
      if (tipY < -20) return;
      const wGlow = Math.max(8, VMIN * 0.022);
      const wMain = Math.max(3.2, VMIN * 0.009);
      const wCore = Math.max(1.2, VMIN * 0.0035);

      // Halo bleuté flou derrière
      const glow = ctx.createLinearGradient(tipX, -30, tipX, tipY);
      glow.addColorStop(0, 'rgba(180, 220, 255, 0.22)');
      glow.addColorStop(1, 'rgba(180, 220, 255, 0.12)');
      ctx.strokeStyle = glow;
      ctx.lineWidth = wGlow;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tipX, -30);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // Corde blanche épaisse
      ctx.strokeStyle = 'rgba(245, 250, 255, 0.95)';
      ctx.lineWidth = wMain;
      ctx.beginPath();
      ctx.moveTo(tipX, -30);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // Cœur brillant
      ctx.strokeStyle = 'rgba(255, 255, 255, 1)';
      ctx.lineWidth = wCore;
      ctx.beginPath();
      ctx.moveTo(tipX, -30);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // Texture irrégulière : petits traits perpendiculaires
      ctx.strokeStyle = 'rgba(220, 235, 255, 0.35)';
      ctx.lineWidth = 0.6;
      const segLen = tipY + 30;
      const n = Math.min(30, Math.floor(segLen / 18));
      for (let i = 0; i < n; i++) {
        const y = -30 + segLen * (i / n);
        const w = (Math.sin(i * 1.7 + f*0.08) * 3) + 1;
        ctx.beginPath();
        ctx.moveTo(tipX - w, y);
        ctx.lineTo(tipX + w, y);
        ctx.stroke();
      }

      // Perles lumineuses
      for (const b of beads) {
        const y = -30 + segLen * b.t;
        if (y > tipY) continue;
        ctx.fillStyle = 'rgba(255, 255, 255, 1)';
        ctx.beginPath();
        ctx.arc(tipX + b.off, y, b.r, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(180, 220, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(tipX + b.off, y, b.r * 2.2, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // ── POINTE QUI AGRIPPE LA CARTE (doigts) ────────────────────────────────
    function drawSplay(tipX, tipY) {
      if (tipY < -10) return;

      const FINGERS = 7;
      const spread  = Math.PI * 0.85;
      const maxLen  = Math.max(50, VMIN * 0.13);

      const fingers = [
        { lenFactor: 0.95, curve:  3 },
        { lenFactor: 0.80, curve: -4 },
        { lenFactor: 1.00, curve:  2 },
        { lenFactor: 0.70, curve:  5 },
        { lenFactor: 0.88, curve: -3 },
        { lenFactor: 0.75, curve:  4 },
        { lenFactor: 0.92, curve: -2 },
      ];

      ctx.strokeStyle = 'rgba(240, 248, 255, 0.85)';
      ctx.lineWidth = 1.2;
      ctx.lineCap = 'round';

      for (let i = 0; i < FINGERS; i++) {
        const t = i / (FINGERS - 1);
        const angle = Math.PI/2 + (t - 0.5) * spread;
        const L = maxLen * fingers[i].lenFactor;
        const ex = tipX + Math.cos(angle) * L;
        const ey = tipY + Math.sin(angle) * L;
        const mx = tipX + Math.cos(angle) * L * 0.55 + fingers[i].curve;
        const my = tipY + Math.sin(angle) * L * 0.55;

        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.quadraticCurveTo(mx, my, ex, ey);
        ctx.stroke();
      }

      // Fibres transversales (filet)
      ctx.strokeStyle = 'rgba(220, 235, 255, 0.35)';
      ctx.lineWidth = 0.5;
      for (let ring = 0; ring < 3; ring++) {
        const r = maxLen * (0.4 + ring * 0.2);
        ctx.beginPath();
        for (let i = 0; i < FINGERS; i++) {
          const t = i / (FINGERS - 1);
          const angle = Math.PI/2 + (t - 0.5) * spread;
          const x = tipX + Math.cos(angle) * r;
          const y = tipY + Math.sin(angle) * r;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ── TOILE RADIALE AUTOUR DE LA CARTE (après atterrissage) ───────────────
    const SPOKES = 22;
    // Anneaux proportionnels à l'écran
    const RINGS  = [0.07, 0.14, 0.22, 0.30, 0.40, 0.50, 0.62, 0.75].map(p => p * VMIN);
    const angles = Array.from({length:SPOKES}, (_,i) => (i/SPOKES)*Math.PI*2 - Math.PI/2);
    const spokeP = new Float32Array(SPOKES);
    const ringP  = new Float32Array(RINGS.length);

    function edgeDist(a) {
      const ca = Math.abs(Math.cos(a)), sa = Math.abs(Math.sin(a));
      const fw = ca < 0.001 ? Infinity : (Math.cos(a) > 0 ? W-CX : CX) / ca;
      const fh = sa < 0.001 ? Infinity : (Math.sin(a) > 0 ? H-CY : CY) / sa;
      return Math.min(fw, fh) * 1.08;
    }

    function drawRadialWeb(f) {
      // Centrer la toile sur la carte (pas sur le milieu du canvas)
      const rect = cardEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      function edgeDistFrom(a, px, py) {
        const ca = Math.abs(Math.cos(a)), sa = Math.abs(Math.sin(a));
        const fw = ca < 0.001 ? Infinity : (Math.cos(a) > 0 ? W-px : px) / ca;
        const fh = sa < 0.001 ? Infinity : (Math.sin(a) > 0 ? H-py : py) / sa;
        return Math.min(fw, fh) * 1.08;
      }

      for (let i = 0; i < SPOKES; i++) {
        const sf = SPOKES_START + i * 2;
        if (f >= sf) spokeP[i] = Math.min(1, (f - sf) / 24);
      }
      for (let i = 0; i < RINGS.length; i++) {
        const sf = RINGS_START + i * 11;
        if (f >= sf) ringP[i] = Math.min(1, (f - sf) / 30);
      }

      ctx.lineWidth = 0.7;
      for (let i = 0; i < SPOKES; i++) {
        if (spokeP[i] <= 0) continue;
        const len = edgeDistFrom(angles[i], cx, cy) * spokeP[i];
        ctx.strokeStyle = `rgba(200, 210, 255, ${0.38 * spokeP[i]})`;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angles[i])*len, cy + Math.sin(angles[i])*len);
        ctx.stroke();
      }

      ctx.lineWidth = 0.55;
      for (let ri = 0; ri < RINGS.length; ri++) {
        if (ringP[ri] <= 0) continue;
        const r = RINGS[ri], alpha = Math.min(0.4, ringP[ri] * 0.8);
        ctx.strokeStyle = `rgba(200, 215, 255, ${alpha})`;
        const segs = Math.floor(SPOKES * ringP[ri]);
        ctx.beginPath();
        let needsMove = true;
        for (let i = 0; i <= segs; i++) {
          const ai = i % SPOKES;
          if (r > edgeDistFrom(angles[ai], cx, cy)) { needsMove = true; continue; }
          const px = cx + Math.cos(angles[ai])*r;
          const py = cy + Math.sin(angles[ai])*r;
          if (needsMove) { ctx.moveTo(px, py); needsMove = false; }
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
    }

    // ── BOUCLE PRINCIPALE ───────────────────────────────────────────────────
    let frame = 0;
    function loop() {
      ctx.clearRect(0, 0, W, H);

      // Fond uni sombre
      ctx.fillStyle = '#050408';
      ctx.fillRect(0, 0, W, H);

      // Poussière qui flotte
      for (const d of dust) {
        d.y += d.vy; d.x += d.vx;
        if (d.y > H) d.y = 0;
        if (d.x > W) d.x = 0; if (d.x < 0) d.x = W;
        ctx.globalAlpha = d.a;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Position actuelle du haut de la carte (suit l'animation CSS)
      const rect = cardEl.getBoundingClientRect();
      const cardTopX = rect.left + rect.width / 2;
      const cardTopY = rect.top;

      // Toile verticale jusqu'à la carte
      drawWebStrand(cardTopX, cardTopY, frame);
      // Doigts qui agrippent la carte
      drawSplay(cardTopX, cardTopY);

      // Toile radiale qui se tisse après atterrissage
      drawRadialWeb(frame);

      frame++;
      requestAnimationFrame(loop);
    }
    loop();

    // ── CHARGER L'AFFICHE ────────────────────────────────────────────────────
    fetch('/api/affiche/Spider-Man%20Brand%20New%20Day')
      .then(r => r.json())
      .then(d => {
        if (d.affiche) {
          const img = document.getElementById('poster');
          img.onload = () => {
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
          };
          img.src = d.affiche;
        }
      }).catch(() => {});
  </script>
</body>
</html>
